  } = props;

  const canvasRef = React.useRef(null);
  const cameraRef = React.useRef(makeCamera());
  const tStart = React.useRef(performance.now());
  const lastFrame = React.useRef(performance.now());
  const dragState = React.useRef(null);
  const supernovaRef = React.useRef({}); // id -> { startT, color, x, y }
  const swallowRef = React.useRef({});    // id -> { startT, x, y, color }
  const calendarAlphaRef = React.useRef(0); // animated 0→1 when single category active
  const lastCalDomainRef = React.useRef('finance'); // last active domain for fade-out
  const egoTractorRef = React.useRef(null); // { fieldId, pull 0→1, startT } when tractor beam active
  // On entering egocentric: snap camera to origin, set zoom for sphere scale, reset tractor
  React.useEffect(() => {
    const cam = cameraRef.current;
    if (props.perspectiveMode === 'egocentric') {
      cam.pos.x = 0; cam.pos.y = 0; cam.pos.z = 0;
      cam.vx = 0; cam.vy = 0; cam.vz = 0;
      cam.zoom = 0.72; // fields at ~580-1650 world units; shows the whole sphere
      cam.vzoom = 0;
      cam.yaw = 0; cam.pitch = -0.1; cam.roll = 0;
      cam.vyaw = 0; cam.vpitch = 0; cam.vroll = 0;
      cam.lastManualInputT = 0; // trigger auto-track immediately
    } else {
      egoTractorRef.current = null;
      // Restore flight-mode start position
      cam.pos.z = 700;
      cam.zoom = 1.0;
    }
  }, [props.perspectiveMode]);
  const projectedStoriesRef = React.useRef([]);
  const projectedFieldsRef = React.useRef([]);
  const projectedConvRef = React.useRef([]);
  const offRadarProjRef = React.useRef([]);
  const cometsProjRef = React.useRef([]);

  // Camera ext-control: smooth zoom-to-focus
  React.useEffect(() => {
    const cam = cameraRef.current;
    cam.flying = true;
    if (focusStoryId) {
      // find world pos by computing now
      const t = (performance.now() - tStart.current) / 1000;
      const found = locateStory(focusStoryId, t);
      if (found) {
        cam.flyTarget = { x: found.x, y: found.y, z: found.z + 110, zoom: 3.0 };
      }
    } else if (focusFieldId) {
      const f = G.FIELDS.find(x => x.id === focusFieldId);
      if (f) {
        const wp = fieldWorldPos(f);
        cam.flyTarget = { x: wp.x, y: wp.y, z: wp.z + 380, zoom: 1.6 };
      }
    } else if (convergenceFocus) {
      const c = G.CONVERGENCES.find(x => `${x.a}::${x.b}` === convergenceFocus);
      if (c) {
        const A = G.FIELDS.find(f => f.id === c.a);
        const B = G.FIELDS.find(f => f.id === c.b);
        if (A && B) {
          const wpA = fieldWorldPos(A), wpB = fieldWorldPos(B);
          const mx = (wpA.x + wpB.x) / 2, my = (wpA.y + wpB.y) / 2, mz = (wpA.z + wpB.z) / 2;
          cam.flyTarget = { x: mx, y: my, z: mz + 320, zoom: 1.9 };
        }
      }
    } else {
      cam.flyTarget = { x: 0, y: 0, z: 700, zoom: 1.0 };
    }
  }, [focusStoryId, focusFieldId, convergenceFocus]);

  // ─── Hyperdrive trigger ─────────────────────────────────
  function triggerWarp(cam) {
    cam.warpT = 0;
    cam.warpDuration = 0.85;       // seconds
    cam.warpFromZ = cam.pos.z;
  }

  // ─── World layout ─────
  const SCALE = 500; // expanded universe — field positions are normalized; multiply for world units
  // ─── Fibonacci sphere distribution for egocentric mode ───────────────────
  // Guarantees fields in ALL directions: directly above, below, left, right,
  // behind, and every diagonal. Uses the golden angle (≈137.5°) for azimuth
  // so no two fields share a direction. Elevation covers full −90° to +90°.
  // Each field's latitude is fixed; longitude (azimuth) drifts slowly over time.
  const EGO_SCALE = 1650; // base radius of the egocentric sphere (world units, 3× expansion)
  const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5)); // ≈2.3999632 rad ≈137.508°

  function fieldWorldPos(f) {
    const base = { x: f.pos.x * SCALE, y: f.pos.y * SCALE, z: (f.pos.z || 0) * 100 };
    if (props.perspectiveMode !== 'egocentric') return base;
    const t = (performance.now() - tStart.current) * 0.001;

    // Find this field's index in the FIELDS array for deterministic placement
    const idx = G.FIELDS.findIndex(x => x.id === f.id);
    const n = G.FIELDS.length;

    // Fibonacci sphere: y goes linearly from +1 (north pole) to −1 (south pole)
    // giving equal solid-angle spacing. arcsin converts to elevation angle.
    const y = 1 - (2 * idx) / Math.max(1, n - 1); // +1 .. −1
    const elevation = Math.asin(clamp(y, -0.9999, 0.9999)); // −π/2 .. +π/2
    const cosEl = Math.cos(elevation);

    // Base azimuth: golden angle ensures no two fields land in the same direction
    const baseAz = (idx * GOLDEN_ANGLE) % (Math.PI * 2);

    // Orbit rate: varies per field so they don't all rotate as one rigid body
    const c0 = f.id.charCodeAt(0) || 65;
    const orbitRate = 0.012 + (c0 % 18) * 0.0007; // ~0.012–0.024 rad/s
    const azimuth = baseAz + t * orbitRate;

    // Distance from YOU = inverse interest weight; range is 0.35×–1× of EGO_SCALE
    const interestAvg = (f.stories || []).reduce((acc, s) => acc + (s.interest_weight || 0.5), 0)
                      / Math.max(1, (f.stories || []).length);
    const tractorPull = (egoTractorRef.current && egoTractorRef.current.fieldId === f.id)
                      ? egoTractorRef.current.pull : 0;
    const baseDist = EGO_SCALE * (0.35 + (1.2 - clamp(interestAvg, 0, 1.2)) * 0.55);
    const dist = baseDist * (1 - tractorPull * 0.72);

    // Spherical → Cartesian (Y = up axis in our convention)
    return {
      x: Math.sin(azimuth) * cosEl * dist,
      y: Math.sin(elevation) * dist,
      z: Math.cos(azimuth) * cosEl * dist,
    };
  }
  function locateStory(id, t) {
    for (const f of G.FIELDS) {
      for (const s of f.stories) {
        if (s.id === id) {
          const wp = fieldWorldPos(f);
          const op = orbitPos(t, s.a, s.e, s.period, s.M0, s.omega, s.Omega, s.i);
          return { x: wp.x + op.x, y: wp.y + op.y, z: wp.z + op.z };
        }
      }
    }
    return null;
  }

  // Particle stars (baked once)
  const stars = React.useMemo(() => {
    const r = rng(11);
    return Array.from({ length: 320 }, () => ({
      x: (r() - 0.5) * 5400,
      y: (r() - 0.5) * 5400,
      z: (r() - 0.5) * 5400,
      a: 0.15 + r() * 0.65,
      s: r() < 0.85 ? 1 : 1.6,
      tw: r() * 6,
    }));
  }, []);
  // Far star field — fills the distant void in all directions
  const farStars = React.useMemo(() => {
    const r = rng(23);
    return Array.from({ length: 600 }, () => ({
      x: (r() - 0.5) * 12000,
      y: (r() - 0.5) * 12000,
      z: (r() - 0.5) * 12000,
      a: 0.25 + r() * 0.5,
    }));
  }, []);

  // Comets — persistent streak animation state
  const cometsRef = React.useRef(null);
  if (!cometsRef.current) {
    const r = rng(91);
    cometsRef.current = (G.COMETS || []).map((c, i) => ({
      data: c,
      // Random starting world position far from camera
      x: (r() - 0.5) * 1600, y: (r() - 0.5) * 1200, z: -300 + (r() - 0.5) * 600,
      // Velocity unit vector
      vx: (r() - 0.5) * 1.6, vy: (r() - 0.5) * 1.2, vz: (r() - 0.5) * 1.4,
      // Phase offset for staggered appearances
      phase: r() * 12,
      hovered: false,
    }));
  }

  // ─── Render loop ─────
  React.useEffect(() => {
    const cnv = canvasRef.current;
    const ctx = cnv.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    cnv.width = width * dpr; cnv.height = height * dpr;
    cnv.style.width = width + 'px'; cnv.style.height = height + 'px';
    ctx.scale(dpr, dpr);
    let raf = 0;

    const draw = () => {
      const now = performance.now();
      const dt = Math.min(0.05, (now - lastFrame.current) / 1000);
      lastFrame.current = now;
      const t = (now - tStart.current) / 1000;
      const cam = cameraRef.current;

      // Smooth fly-to (runs even when paused so fly-to lands)
      if (cam.flyTarget) {
        const k = 1 - Math.pow(0.04, dt);
        cam.pos.x = lerp(cam.pos.x, cam.flyTarget.x, k);
        cam.pos.y = lerp(cam.pos.y, cam.flyTarget.y, k);
        cam.pos.z = lerp(cam.pos.z, cam.flyTarget.z, k);
        cam.zoom = lerp(cam.zoom, cam.flyTarget.zoom, k);
        cam.pitch = lerp(cam.pitch, -0.05, k * 0.5);
        if (Math.abs(cam.pos.z - cam.flyTarget.z) < 1 && Math.abs(cam.zoom - cam.flyTarget.zoom) < 0.01) {
          cam.flyTarget = null;
        }
      } else if (!cam.paused) {
        // ─── Apply user input intent ───
        const kt = cam.keyThrust;
        cam.vyaw   += kt.yaw   * 0.00045 * dt * 60;
        cam.vpitch += kt.pitch * 0.00045 * dt * 60;
        cam.vroll  += kt.roll  * 0.00035 * dt * 60;
        cam.vz -= kt.fwd  * 0.45 * dt * 60;
        cam.vx += kt.lat  * 0.30 * dt * 60;
        cam.vy -= kt.vert * 0.30 * dt * 60;

        if (cam.mouseLookEnabled) {
          cam.vyaw   += cam.mouseYaw   * 0.0010 * dt * 60;
          cam.vpitch += cam.mousePitch * 0.0010 * dt * 60;
        }

        // Apply velocities w/ decay
        cam.pos.x += cam.vx * dt * 60;
        cam.pos.y += cam.vy * dt * 60;
        cam.pos.z += cam.vz * dt * 60;
        cam.yaw += cam.vyaw * dt * 60;
        cam.pitch += cam.vpitch * dt * 60;
        cam.roll += cam.vroll * dt * 60;
        cam.zoom = clamp(cam.zoom + cam.vzoom * dt * 60, 0.35, 5.0);

        // ─── Perpetual drift ───
        const focused = focusStoryId || focusFieldId || convergenceFocus;
        if (cam.driftEnabled && !cam.warpDuration && !focused && props.perspectiveMode !== 'egocentric') {
          const speed = cam.driftSpeed * dt * 60;
          const cy2 = Math.cos(cam.yaw), sy2 = Math.sin(cam.yaw);
          const cp2 = Math.cos(cam.pitch), sp2 = Math.sin(cam.pitch);
          const fx = -sy2 * cp2, fy = sp2, fz = -cy2 * cp2;
          let nz = cam.pos.z + fz * speed;
          if (nz < 220) {
            cam.pos.z += (700 - cam.pos.z) * 0.0008 * dt * 60;
          } else {
            cam.pos.x += fx * speed;
            cam.pos.y += fy * speed;
            cam.pos.z += fz * speed;
          }
          const dist2 = Math.hypot(cam.pos.x, cam.pos.y);
          if (dist2 > 600) {
            const pull = (dist2 - 600) * 0.001 * dt * 60;
            cam.pos.x -= (cam.pos.x / dist2) * pull;
            cam.pos.y -= (cam.pos.y / dist2) * pull;
          }
        }

        // Decay
        const decay = Math.pow(0.965, dt * 60);
        cam.vx *= decay; cam.vy *= decay; cam.vz *= decay;
        cam.vyaw *= decay; cam.vpitch *= decay; cam.vroll *= decay;
        cam.vzoom *= 0.92;
        cam.roll *= Math.pow(0.985, dt * 60);
        // In flight mode, clamp pitch to avoid extreme flipping.
        // In egocentric, allow full vertical freedom (±90°) to reach poles.
        if (props.perspectiveMode === 'egocentric') {
          cam.pitch = clamp(cam.pitch, -Math.PI * 0.499, Math.PI * 0.499);
          cam.roll = clamp(cam.roll, -Math.PI, Math.PI); // free roll in space
        } else {
          cam.pitch = clamp(cam.pitch, -1.2, 1.2);
          cam.roll = clamp(cam.roll, -0.8, 0.8);
        }

        // Egocentric mode: YOU fixed at origin; universe orbits you.
        if (props.perspectiveMode === 'egocentric') {
          cam.pos.x = 0; cam.pos.y = 0; cam.pos.z = 0;
          cam.vx = 0; cam.vy = 0; cam.vz = 0;
          cam.zoom = clamp(cam.zoom, 0.15, 5.0);

          // Tractor beam: animate pull value 0→1 over 2 seconds
          if (egoTractorRef.current) {
            const elapsed = (now - egoTractorRef.current.startT) / 1000;
            egoTractorRef.current.pull = clamp(elapsed / 2, 0, 1);
          }

          // Auto-scan: after 5s idle, slowly rotate YAW only — never fights pitch.
          // User sets their own vertical angle; auto-scan just pans horizontally
          // so you sweep through all 360° and spot everything around you.
          const sinceInput = now - cam.lastManualInputT;
          if (sinceInput > 5000) {
            // Base slow 360° horizontal sweep (~70 seconds per revolution)
            cam.yaw += 0.0009 * dt * 60;
          }
        }
      }

      // Clear
      ctx.clearRect(0, 0, width, height);

      // Background gradient (deep space)
      const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height) * 0.7);
      bg.addColorStop(0, 'rgba(20, 14, 30, 0.55)');
      bg.addColorStop(0.5, 'rgba(10, 10, 18, 0.4)');
      bg.addColorStop(1, 'rgba(8, 8, 12, 0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      // Focus celestial bg (when story focused, deep zoom)
      if (focusStoryId && cam.zoom > 2.2) {
        const story = locateStoryObj(focusStoryId);
        if (story) {
          const cat = G.CATEGORY[story.field.domain];
          const intensity = smoothstep(2.2, 3.5, cam.zoom);
          ctx.save();
          ctx.globalAlpha = intensity * 0.85;
          drawCelestialBg(ctx, t, cat.color, width, height);
          ctx.restore();
        }
      }

      // Far stars (parallax)
      ctx.fillStyle = '#f5f5f0';
      for (const s of farStars) {
        const p = project(s, cam, width, height);
        if (!p.visible) continue;
        ctx.globalAlpha = s.a * 0.4;
        ctx.fillRect(p.x, p.y, 1, 1);
      }
      // Mid stars
      for (const s of stars) {
        const p = project(s, cam, width, height);
        if (!p.visible) continue;
        const tw = 0.7 + 0.3 * Math.sin(t * 1.3 + s.tw);
        ctx.globalAlpha = s.a * tw * 0.8;
        ctx.fillRect(p.x, p.y, s.s, s.s);
      }
      ctx.globalAlpha = 1;

      // ── Volumetric dust noise (scales with low signal volume) ──────
      // When signal volume is dropped, the universe gets noisier — extra
      // dust particles drift across the screen, making the image less crisp.
      const dustNoise = clamp(1 - (signalVolume ?? 0) / 30, 0, 1);
      if (dustNoise > 0.05) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const dustCount = Math.floor(60 + dustNoise * 240);
        for (let di = 0; di < dustCount; di++) {
          const seed = di * 47 + 3;
          const baseX = ((seed * 13) % 1000) / 1000 * width;
          const baseY = ((seed * 29) % 1000) / 1000 * height;
          const drift = t * 6 * (0.3 + (seed % 7) / 10);
          const dx = (baseX + Math.cos(seed) * 30 * Math.sin(t * 0.2 + seed) + drift) % width;
          const dy = (baseY + Math.sin(seed * 0.7) * 20 * Math.sin(t * 0.15 + seed * 0.3)) % height;
          const dr = 0.5 + ((seed * 11) % 20) / 10 * dustNoise;
          const a = (0.04 + 0.10 * dustNoise) * (0.5 + 0.5 * Math.sin(t * 0.3 + seed));
          ctx.fillStyle = `rgba(180, 165, 200, ${a})`;
          ctx.beginPath();
          ctx.arc(dx, dy, dr, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // Project all fields
      // ── Personalization mixing ──────────────────────────────────────
      // signalVolume HIGH (=30) = sharp, only top-interest fields
      // signalVolume LOW  (=0)  = noisy, outsider fields appear
      const sigNorm = clamp((signalVolume ?? 0) / 30, 0, 1);  // 0..1
      const noiseLevel = 1 - sigNorm;                          // 0..1, low = noisy
      const outsiderFraction = noiseLevel;
      const activeFields = [...G.FIELDS];
      if (G.OUTSIDERS && noiseLevel > 0.05) {
        const cutoff = Math.ceil(G.OUTSIDERS.length * outsiderFraction);
        for (let oi = 0; oi < cutoff; oi++) activeFields.push(G.OUTSIDERS[oi]);
      }

      // Capital ↔ Attention bias: 0 = capital (vol), 1 = attention
      const attnBias = clamp(capital ?? 0.5, 0, 1);
      // Effective magnitude per story for sizing/visibility
      const magOf = (s) => {
        const capMag = s.magnitude;
        const attnMag = s.attention || s.magnitude;
        return capMag * (1 - attnBias) + attnMag * attnBias;
      };

      // Time horizon shifts orbit phase (advances all bets toward resolution)
      const horizonShift = (timeHorizon ?? 0) * Math.PI * 2 * 0.6;

      // Personal gravity warp: low-interest stories get pushed outward.
      const gravStrength = clamp(gravity ?? 0.5, 0, 1);

      // ── Convergence nudge: build per-field offset vectors so participating
      //    fields drift toward their convergence partner. Stronger pull when
      //    that convergence is the active focus.
      const convNudge = {};
      for (const c of G.CONVERGENCES) {
        const A = G.FIELDS.find(f => f.id === c.a);
        const B = G.FIELDS.find(f => f.id === c.b);
        if (!A || !B) continue;
        const isFocused = convergenceFocus === `${c.a}::${c.b}`;
        const sevScale = c.severity === 'HIGH' ? 1.0 : c.severity === 'MED' ? 0.6 : 0.3;
        const pull = (isFocused ? 0.18 : 0.04) * sevScale;
        const breath = 1 + 0.06 * Math.sin(t * 0.9);
        const wpA = fieldWorldPos(A), wpB = fieldWorldPos(B);
        const dx = wpB.x - wpA.x, dy = wpB.y - wpA.y, dz = wpB.z - wpA.z;
        const k = pull * breath;
        if (!convNudge[A.id]) convNudge[A.id] = { dx: 0, dy: 0, dz: 0 };
        if (!convNudge[B.id]) convNudge[B.id] = { dx: 0, dy: 0, dz: 0 };
        convNudge[A.id].dx +=  dx * k; convNudge[A.id].dy +=  dy * k; convNudge[A.id].dz +=  dz * k;
        convNudge[B.id].dx += -dx * k; convNudge[B.id].dy += -dy * k; convNudge[B.id].dz += -dz * k;
      }

      const fieldsProj = activeFields.map(f => {
        // Field-level interest = avg of its stories' interest_weight
        const fieldInt = f.stories.reduce((acc, s) => acc + (s.interest_weight ?? 0.85), 0) / Math.max(1, f.stories.length);
        // Push outsider fields outward; low interest + high gravity = far away
        const outwardPush = (1 - fieldInt) * gravStrength * 0.65;
        // Stable jitter from id hash so outsiders are placed deterministically
        const h = (f.id.charCodeAt(0) * 13 + (f.id.charCodeAt(1) || 0) * 7) % 360;
        const ang = (h / 360) * Math.PI * 2;
        const wp = fieldWorldPos(f);
        wp.x += Math.cos(ang) * outwardPush * SCALE * 0.9;
        wp.y += Math.sin(ang) * outwardPush * SCALE * 0.9;
        // Convergence nudge — pull toward partner field(s)
        const nud = convNudge[f.id];
        if (nud) { wp.x += nud.dx; wp.y += nud.dy; wp.z += nud.dz; }
        wp.z += Math.sin(ang * 1.7) * outwardPush * SCALE * 0.4;
        const proj = project(wp, cam, width, height);
        const cat = G.CATEGORY[f.domain];
        const dimmed = !filterCats.includes(f.domain);
        return { f, wp, proj, cat, dimmed, fieldInt };
      });
      projectedFieldsRef.current = fieldsProj;

      // Sort by depth descending (far first)
      const fieldsSorted = [...fieldsProj].filter(p => p.proj.visible).sort((a, b) => b.proj.depth - a.proj.depth);

      // Convergence arcs (3D — arc through midpoint between fields)
      const convList = [];
      for (const c of G.CONVERGENCES) {
        const A = fieldsProj.find(x => x.f.id === c.a);
        const B = fieldsProj.find(x => x.f.id === c.b);
        if (!A || !B || !A.proj.visible || !B.proj.visible) continue;
        if (A.dimmed && B.dimmed) continue;
        const midWp = { x: (A.wp.x + B.wp.x) / 2, y: (A.wp.y + B.wp.y) / 2, z: (A.wp.z + B.wp.z) / 2 };
        const midProj = project(midWp, cam, width, height);
        // Bow outward perpendicular
        const dx = B.proj.x - A.proj.x, dy = B.proj.y - A.proj.y;
        const dist = Math.hypot(dx, dy);
        const nx = -dy / Math.max(1, dist), ny = dx / Math.max(1, dist);
        const bow = dist * 0.16;
        const cx = (A.proj.x + B.proj.x) / 2 + nx * bow;
        const cy_ = (A.proj.y + B.proj.y) / 2 + ny * bow;
        const isActive = convergenceFocus === `${c.a}::${c.b}`;
        const pulse = (isActive ? 0.65 : 0.22) + 0.14 * Math.sin(t * 0.9 + dist * 0.005);
        if (isActive) {
          ctx.beginPath();
          ctx.moveTo(A.proj.x, A.proj.y);
          ctx.quadraticCurveTo(cx, cy_, B.proj.x, B.proj.y);
          ctx.strokeStyle = hexA(c.sev_color, 0.18);
          ctx.lineWidth = 12;
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.moveTo(A.proj.x, A.proj.y);
        ctx.quadraticCurveTo(cx, cy_, B.proj.x, B.proj.y);
        ctx.strokeStyle = hexA(c.sev_color, pulse);
        ctx.setLineDash(isActive ? [6, 3] : [3, 5]);
        ctx.lineDashOffset = isActive ? -t * 28 : 0;
        ctx.lineWidth = isActive ? 2.4 : 1;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineDashOffset = 0;
        // Convergence label / hit zone
        convList.push({ c, x: cx, y: cy_, A, B });
      }
      projectedConvRef.current = convList;

      // Draw fields (back-to-front)
      const allStoryProj = [];
      for (const item of fieldsSorted) {
        const { f, wp, proj, cat, dimmed, fieldInt } = item;
        const op = dimmed ? 0.18 : 1;
        // Outsider fields are slightly more transparent + more diffuse
        const outsiderness = clamp(1 - (fieldInt ?? 0.85), 0, 1);

        // ── Gassy nebula — multi-blob layered cloud ──────────────────
        // Larger overall radius, multiple tinted blobs offset around center
        // for an expansive, less-dense feel.
        const baseR = 175 * proj.scale * 0.7 * (1 + outsiderness * 0.5);
        const breathe = 1 + 0.08 * Math.sin(t * 0.35 + f.id.charCodeAt(0) * 0.7);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const blobs = 5;
        for (let bi = 0; bi < blobs; bi++) {
          const ang = (bi / blobs) * Math.PI * 2 + t * 0.05 + f.id.charCodeAt(0);
          const off = baseR * 0.32 * (0.6 + 0.4 * Math.sin(t * 0.3 + bi * 1.3));
          const bx = proj.x + Math.cos(ang) * off;
          const by = proj.y + Math.sin(ang) * off * 0.7;
          const br = baseR * (0.55 + 0.18 * Math.sin(t * 0.4 + bi * 2.1)) * breathe;
          const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
          const peak = (f.phase === 'peak' ? 0.16 : 0.12) * op;
          g.addColorStop(0, hexA(cat.color, peak));
          g.addColorStop(0.45, hexA(cat.color, peak * 0.4));
          g.addColorStop(1, hexA(cat.color, 0));
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(bx, by, br, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        // Bright core wisp
        const coreR = (f.phase === 'peak' ? 9 : 7) * proj.scale * 0.6;
        const core = ctx.createRadialGradient(proj.x, proj.y, 0, proj.x, proj.y, Math.max(2, coreR * 6));
        core.addColorStop(0, hexA('#ffffff', 0.55 * op));
        core.addColorStop(0.25, hexA(cat.color, 0.45 * op));
        core.addColorStop(1, hexA(cat.color, 0));
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, Math.max(2, coreR * 6), 0, Math.PI * 2);
        ctx.fill();

        // Story orbits — only render if not absorbed
        for (const s of f.stories) {
          if (untrackedIds.includes(s.id)) {
            // Black-hole swallow animation
            if (!swallowRef.current[s.id]) {
              const wpStart = locateStory(s.id, t);
              if (wpStart) swallowRef.current[s.id] = { startT: t, wpStart, color: cat.color, fieldId: f.id };
            }
            continue;
          }
          const sMag = magOf(s);
          // Lower-magnitude bets visible only at higher zoom (zoom = magnification → reveals smaller bets)
          const minZoomForMag = sMag >= 22 ? 0 : sMag >= 16 ? 0.55 : sMag >= 12 ? 0.95 : sMag >= 8 ? 1.4 : 1.9;
          if (cam.zoom < minZoomForMag) continue;
          // Signal volume gating: HIGH volume hides quiet bets; LOW volume shows everything
          const sigCut = sigNorm * 26;  // 0..26 magnitude floor
          if (sMag < sigCut) continue;

          // Time horizon advances all orbits forward (toward bet resolution)
          const sM0 = s.M0 + horizonShift;

          // Show probability cones if zoomed in past 1.6
          if (cam.zoom > 1.6) {
            for (let pi = 0; pi < s.futures.length; pi++) {
              const fut = s.futures[pi];
              const aFut = s.a * (0.85 + 0.15 * (fut.p / 100));
              const eFut = clamp(s.e + (pi - 1) * 0.05, 0.02, 0.7);
              ctx.beginPath();
              const steps = 80;
              for (let k = 0; k <= steps; k++) {
                const tk = t + (k / steps) * s.period;
                const op2 = orbitPos(tk, aFut, eFut, s.period, sM0, s.omega, s.Omega, s.i);
                const pp = project({ x: wp.x + op2.x, y: wp.y + op2.y, z: wp.z + op2.z }, cam, width, height);
                if (!pp.visible) continue;
                if (k === 0) ctx.moveTo(pp.x, pp.y); else ctx.lineTo(pp.x, pp.y);
              }
              ctx.strokeStyle = hexA(cat.color, (pi === 0 ? 0.22 : 0.08) * op);
              ctx.setLineDash(pi === 0 ? [] : [2, 4]);
              ctx.lineWidth = pi === 0 ? 0.8 : 0.6;
              ctx.stroke();
              ctx.setLineDash([]);
            }
          } else {
            // Solo orbit ring (faint)
            ctx.beginPath();
            const steps = 64;
            for (let k = 0; k <= steps; k++) {
              const tk = t + (k / steps) * s.period;
              const op2 = orbitPos(tk, s.a, s.e, s.period, sM0, s.omega, s.Omega, s.i);
              const pp = project({ x: wp.x + op2.x, y: wp.y + op2.y, z: wp.z + op2.z }, cam, width, height);
              if (!pp.visible) continue;
              if (k === 0) ctx.moveTo(pp.x, pp.y); else ctx.lineTo(pp.x, pp.y);
            }
            ctx.strokeStyle = hexA(cat.color, 0.08 * op);
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }

          // Trajectory trace (past)
          const traceSteps = 18;
          ctx.beginPath();
          for (let k = 0; k < traceSteps; k++) {
            const tk = t - (k / traceSteps) * (s.period * 0.18);
            const op2 = orbitPos(tk, s.a, s.e, s.period, sM0, s.omega, s.Omega, s.i);
            const pp = project({ x: wp.x + op2.x, y: wp.y + op2.y, z: wp.z + op2.z }, cam, width, height);
            if (!pp.visible) continue;
            if (k === 0) ctx.moveTo(pp.x, pp.y); else ctx.lineTo(pp.x, pp.y);
          }
          ctx.strokeStyle = hexA(cat.color, 0.32 * op);
          ctx.lineWidth = 1.0;
          ctx.stroke();

          // Current position
          const op2 = orbitPos(t, s.a, s.e, s.period, sM0, s.omega, s.Omega, s.i);
          const sw = { x: wp.x + op2.x, y: wp.y + op2.y, z: wp.z + op2.z };
          const sp = project(sw, cam, width, height);
          if (!sp.visible) continue;

          // Pulse from urgency: faster pulse as daysToClose drops.
          const pulseFreq = 0.6 + 8 / Math.max(1, s.daysToClose);
          const pulseAmp = 0.18 + clamp(1 - s.daysToClose / 60, 0, 0.6);
          let pulseV = 1 + pulseAmp * (0.5 + 0.5 * Math.sin(t * pulseFreq * 2));
          // Resolving: dim/slow
          if (s.lifecycle === 'resolving') {
            pulseV *= 0.5 + 0.3 * Math.sin(t * 0.5);
          }

          const baseR = (3 + (sMag / 30) * 4) * sp.scale * 0.45;
          const isHovered = hoverStory && hoverStory.id === s.id;
          const isSaved = savedStoryIds.includes(s.id);
          const isFocus = focusStoryId === s.id;
          const r = (isHovered || isFocus ? baseR * 1.7 : baseR) * pulseV;

          // Body glow (always radial — glow respects color regardless of shape)
          const bg2 = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, r * 4);
          bg2.addColorStop(0, hexA(cat.color, 0.95 * op));
          bg2.addColorStop(0.5, hexA(cat.color, 0.4 * op));
          bg2.addColorStop(1, hexA(cat.color, 0));
          ctx.fillStyle = bg2;
          ctx.beginPath(); ctx.arc(sp.x, sp.y, r * 4, 0, Math.PI * 2); ctx.fill();
          // Body — shape varies by s.shape ; rotation by s.spin
          const bodyR = Math.max(0.8, r);
          const rot = (t * (s.spin || 0.5));
          ctx.save();
          ctx.translate(sp.x, sp.y);
          ctx.fillStyle = hexA('#ffffff', op);
          if (s.shape === 'oblong') {
            ctx.rotate(rot);
            ctx.beginPath();
            ctx.ellipse(0, 0, bodyR * 1.5, bodyR * 0.7, 0, 0, Math.PI * 2);
            ctx.fill();
          } else if (s.shape === 'spinner') {
            ctx.rotate(rot * 1.6);
            ctx.beginPath();
            ctx.moveTo(0, -bodyR * 1.4);
            ctx.lineTo(bodyR * 1.0, 0);
            ctx.lineTo(0, bodyR * 1.4);
            ctx.lineTo(-bodyR * 1.0, 0);
            ctx.closePath();
            ctx.fill();
          } else if (s.shape === 'comet') {
            const tk = t - 0.6;
            const prev = orbitPos(tk, s.a, s.e, s.period, sM0, s.omega, s.Omega, s.i);
            const ppPrev = project({ x: wp.x + prev.x, y: wp.y + prev.y, z: wp.z + prev.z }, cam, width, height);
            const tdx = sp.x - ppPrev.x, tdy = sp.y - ppPrev.y;
            const tlen = Math.hypot(tdx, tdy) || 1;
            const tx = -tdx / tlen, ty = -tdy / tlen;
            ctx.translate(-sp.x, -sp.y);
            const tail = ctx.createLinearGradient(sp.x, sp.y, sp.x + tx * bodyR * 14, sp.y + ty * bodyR * 14);
            tail.addColorStop(0, hexA('#ffffff', 0.85 * op));
            tail.addColorStop(0.4, hexA(cat.color, 0.5 * op));
            tail.addColorStop(1, hexA(cat.color, 0));
            ctx.fillStyle = tail;
            ctx.beginPath();
            ctx.moveTo(sp.x + ty * bodyR * 0.8, sp.y - tx * bodyR * 0.8);
            ctx.lineTo(sp.x + tx * bodyR * 14, sp.y + ty * bodyR * 14);
            ctx.lineTo(sp.x - ty * bodyR * 0.8, sp.y + tx * bodyR * 0.8);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = hexA('#ffffff', op);
            ctx.beginPath();
            ctx.arc(sp.x, sp.y, bodyR * 1.1, 0, Math.PI * 2);
            ctx.fill();
          } else if (s.shape === 'wobble') {
            const wob = (s.wobble ?? 0.4);
            ctx.rotate(rot);
            ctx.beginPath();
            const lobes = 6;
            for (let li = 0; li <= lobes; li++) {
              const ang = (li / lobes) * Math.PI * 2;
              const rad = bodyR * (1 + wob * 0.35 * Math.sin(t * 1.3 + li * 1.7));
              const x = Math.cos(ang) * rad;
              const y = Math.sin(ang) * rad;
              if (li === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();

          // Saved ring
          if (isSaved) {
            ctx.strokeStyle = hexA('#F0A500', op);
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.arc(sp.x, sp.y, r + 5, 0, Math.PI * 2);
            ctx.stroke();
          }

          // Satellites — emerge progressively with zoom. Low-interest stories
          // get extra synthetic satellites and more erratic orbits.
          const interest = s.interest_weight ?? 0.85;
          const erratic = clamp(1 - interest, 0, 1); // 0 = stable, 1 = chaotic
          const satRevealZoom = 0.3; // show satellites at near-default zoom
          if (cam.zoom > satRevealZoom && s.satellites && s.satellites.length) {
            const visible = Math.min(
              s.satellites.length + Math.floor(noiseLevel * 2),
              Math.ceil(s.satellites.length * smoothstep(satRevealZoom, 1.2, cam.zoom)) + (erratic > 0.5 ? 2 : 0)
            );
            for (let si = 0; si < visible; si++) {
              const sat = s.satellites[si % s.satellites.length] || { id: `${s.id}_phantom_${si}`, name: 'minor bet', prob: 20 + (si * 7) % 60, vol: '$' + (40 + si * 17) + 'k' };
              const satA = (20 + si * 8) * (1 + erratic * 0.6);
              // Slow orbit when zoomed in so satellites can be clicked
              const satPeriod = (4 + si * 1.5 + erratic * 3) * Math.max(1, cam.zoom * cam.zoom * 0.9);
              // Erratic satellites wobble: precess + tilt independently
              const wobble = erratic * 0.5;
              const satM = (t * 2 * Math.PI / satPeriod) + si * 1.2 + wobble * Math.sin(t * 0.7 + si);
              const satX = sw.x + Math.cos(satM) * satA;
              const satY = sw.y + Math.sin(satM) * satA * (1 - erratic * 0.4);
              const satZ = sw.z + Math.sin(satM * (1 + erratic) * 0.7) * satA * 0.5;
              const satP = project({ x: satX, y: satY, z: satZ }, cam, width, height);
              if (!satP.visible) continue;
              const satAlpha = smoothstep(satRevealZoom, satRevealZoom + 0.3, cam.zoom);
              // Always at least 2px; grows with zoom for clicking
              const satR = Math.max(2.0, (2.5 + cam.zoom * 2.5) * satP.scale * 0.5);
              // Glow when zoomed enough to click
              if (cam.zoom > 1.4) {
                const sg = ctx.createRadialGradient(satP.x, satP.y, 0, satP.x, satP.y, satR * 3);
                sg.addColorStop(0, hexA(cat.color, 0.25 * satAlpha * op));
                sg.addColorStop(1, hexA(cat.color, 0));
                ctx.fillStyle = sg;
                ctx.beginPath(); ctx.arc(satP.x, satP.y, satR * 3, 0, Math.PI * 2); ctx.fill();
              }
              ctx.fillStyle = hexA(cat.color, (0.65 + 0.3 * (1 - erratic)) * op * satAlpha);
              ctx.beginPath();
              ctx.arc(satP.x, satP.y, satR, 0, Math.PI * 2);
              ctx.fill();
              if (cam.zoom > 1.5) {
                ctx.fillStyle = hexA('#f5f5f0', 0.65 * op * satAlpha);
                ctx.font = `${Math.max(8, 9 * satP.scale * 0.5)}px 'JetBrains Mono', monospace`;
                ctx.fillText(sat.name, satP.x + satR + 3, satP.y + 3);
              }
              allStoryProj.push({
                id: sat.id, isSatellite: true, parentId: s.id,
                name: sat.name, prob: sat.prob, vol: sat.vol,
                urgency: sat.urgency || s.urgency, daysToClose: s.daysToClose,
                _x: satP.x, _y: satP.y, proj: satP,
                _domain: f.domain, _fieldName: f.name, _fieldId: f.id,
                _hitR: Math.max(8, satR * 2.5),
              });
            }
          }

          // Add to hit-list
          allStoryProj.push({
            ...s, _x: sp.x, _y: sp.y, _domain: f.domain, _fieldName: f.name, _fieldId: f.id,
            proj: sp, _hitR: Math.max(8, r * 4),
          });
        }
      }
      projectedStoriesRef.current = allStoryProj;

      // Resolving stories — fade-out animation
      // (already dimmed above; supernova handled in supernovaRef)

      // Supernova animations
      for (const id of Object.keys(supernovaRef.current)) {
        const sn = supernovaRef.current[id];
        const age = (t - sn.startT) / 2.0;
        if (age >= 1) { delete supernovaRef.current[id]; continue; }
        const wpProj = project(sn.wp, cam, width, height);
        if (!wpProj.visible) continue;
        drawSupernova(ctx, wpProj.x, wpProj.y, sn.color, age);
      }

      // Black hole — bottom-left of canvas
      const bhWp = { x: -SCALE * 0.95, y: SCALE * 0.7, z: -50 };
      const bhProj = project(bhWp, cam, width, height);
      if (bhProj.visible) {
        drawBlackHole(ctx, bhProj.x, bhProj.y, 18 * bhProj.scale * 0.6, t, 0.8);
      }

      // Swallow animations toward black hole
      for (const id of Object.keys(swallowRef.current)) {
        const sw = swallowRef.current[id];
        const age = (t - sw.startT) / 1.6;
        if (age >= 1) { delete swallowRef.current[id]; continue; }
        const k = smoothstep(0, 1, age);
        const cur = {
          x: lerp(sw.wpStart.x, bhWp.x, k),
          y: lerp(sw.wpStart.y, bhWp.y, k),
          z: lerp(sw.wpStart.z, bhWp.z, k),
        };
        // Spiral
        const spin = age * Math.PI * 6;
        cur.x += Math.cos(spin) * (1 - k) * 30;
        cur.y += Math.sin(spin) * (1 - k) * 30;
        const sp = project(cur, cam, width, height);
        if (!sp.visible) continue;
        const r = (1 - k) * 5 * sp.scale * 0.5;
        ctx.fillStyle = hexA(sw.color, (1 - k));
        ctx.beginPath(); ctx.arc(sp.x, sp.y, Math.max(0.5, r), 0, Math.PI * 2); ctx.fill();
        // Trail
        ctx.strokeStyle = hexA(sw.color, (1 - k) * 0.4);
        ctx.lineWidth = 1;
        for (let kk = 0; kk < 6; kk++) {
          const aa = age - kk * 0.04;
          if (aa < 0) continue;
          const kk2 = smoothstep(0, 1, aa);
          const sp2 = project({
            x: lerp(sw.wpStart.x, bhWp.x, kk2) + Math.cos(aa * Math.PI * 6) * (1 - kk2) * 30,
            y: lerp(sw.wpStart.y, bhWp.y, kk2) + Math.sin(aa * Math.PI * 6) * (1 - kk2) * 30,
            z: lerp(sw.wpStart.z, bhWp.z, kk2),
          }, cam, width, height);
          if (sp2.visible) {
            ctx.beginPath(); ctx.arc(sp2.x, sp2.y, 0.5 + (1-kk2) * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = hexA(sw.color, (1 - kk2) * 0.3);
            ctx.fill();
          }
        }
      }

      // Center YOU body (camera-relative — at world origin)
      if (props.perspectiveMode === 'egocentric') {
        // YOU are always at exact screen center — the singular gravitational anchor
        const cx = width / 2, cy = height / 2;
        const pulse = 0.55 + 0.22 * Math.sin(t * 1.3);
        const pulse2 = 0.5 + 0.3 * Math.sin(t * 0.7 + 1.2);
        // Far outer corona — vast gravitational field
        const corona = ctx.createRadialGradient(cx, cy, 0, cx, cy, 220);
        corona.addColorStop(0, `rgba(240, 165, 0, ${0.08 * pulse2})`);
        corona.addColorStop(0.5, `rgba(240, 165, 0, 0.03)`);
        corona.addColorStop(1, 'rgba(240, 165, 0, 0)');
        ctx.fillStyle = corona;
        ctx.beginPath(); ctx.arc(cx, cy, 220, 0, Math.PI * 2); ctx.fill();
        // Mid aura
        const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
        aura.addColorStop(0, `rgba(240, 165, 0, ${0.22 * pulse})`);
        aura.addColorStop(0.5, `rgba(200, 120, 0, 0.08)`);
        aura.addColorStop(1, 'rgba(240, 165, 0, 0)');
        ctx.fillStyle = aura;
        ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI * 2); ctx.fill();
        // Inner glow
        const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32);
        ig.addColorStop(0, `rgba(255, 255, 248, ${pulse})`);
        ig.addColorStop(0.45, 'rgba(240, 165, 0, 0.5)');
        ig.addColorStop(1, 'rgba(240, 165, 0, 0)');
        ctx.fillStyle = ig;
        ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI * 2); ctx.fill();
        // Core
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
        // Concentric orbit rings at different radii
        for (const [rad, dash, gap, a] of [[22, 5, 9, 0.35], [38, 3, 12, 0.2], [58, 2, 16, 0.12]]) {
          ctx.strokeStyle = `rgba(240, 165, 0, ${a * (0.8 + 0.2 * pulse)})`;
          ctx.lineWidth = 0.8;
          ctx.setLineDash([dash, gap]);
          ctx.lineDashOffset = -(t * (3 - rad * 0.02)) % (dash + gap);
          ctx.beginPath(); ctx.arc(cx, cy, rad + 2 * pulse, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.setLineDash([]); ctx.lineDashOffset = 0;
        // "YOU · CENTER OF GRAVITY" label
        ctx.fillStyle = `rgba(240, 165, 0, ${0.65 * pulse})`;
        ctx.font = "bold 8px 'JetBrains Mono', monospace";
        ctx.textAlign = 'center';
        ctx.fillText('YOU  ·  CENTER OF GRAVITY', cx, cy + 52);
        ctx.textAlign = 'left';

        // Tractor beam: animated line from YOU center to the target field
        if (egoTractorRef.current) {
          const tr = egoTractorRef.current;
          const tField = G.FIELDS.find(f => f.id === tr.fieldId);
          if (tField) {
            const twp = fieldWorldPos(tField);
            const tProj = project(twp, cam, width, height);
            if (tProj.visible) {
              const pull = tr.pull;
              const beamPhase = (t * 3) % 1;
              // Dashed animated beam
              ctx.save();
              ctx.strokeStyle = `rgba(240, 165, 0, ${0.5 + 0.3 * pull})`;
              ctx.lineWidth = 1.5 + pull * 1.5;
              ctx.setLineDash([12, 10]);
              ctx.lineDashOffset = -t * 30;
              ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tProj.x, tProj.y); ctx.stroke();
              ctx.setLineDash([]);
              // Particles along beam
              for (let bi = 0; bi < 5; bi++) {
                const bFrac = (bi / 5 + beamPhase) % 1;
                const bx = lerp(cx, tProj.x, bFrac);
                const by = lerp(cy, tProj.y, bFrac);
                const bAlpha = Math.sin(bFrac * Math.PI) * 0.8 * pull;
                ctx.fillStyle = `rgba(240, 165, 0, ${bAlpha})`;
                ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI * 2); ctx.fill();
              }
              // LOCKED label near target
              if (pull > 0.5) {
                const cat = G.CATEGORY[tField.domain] || {};
                ctx.fillStyle = hexA(cat.color || '#F0A500', 0.9);
                ctx.font = "bold 9px 'JetBrains Mono', monospace";
                ctx.textAlign = 'center';
                ctx.fillText('⟵ LOCKED', tProj.x, tProj.y - 22);
                ctx.textAlign = 'left';
              }
              ctx.restore();
            }
          }
        }
      } else {
        const userProj = project({ x: 0, y: 0, z: 0 }, cam, width, height);
        if (userProj.visible) {
          const userPulse = 0.6 + 0.18 * Math.sin(t * 1.2);
          const ur = 60 * userProj.scale * 0.5;
          const ug = ctx.createRadialGradient(userProj.x, userProj.y, 0, userProj.x, userProj.y, Math.max(8, ur));
          ug.addColorStop(0, `rgba(245, 245, 240, ${userPulse})`);
          ug.addColorStop(0.4, 'rgba(240, 165, 0, 0.25)');
          ug.addColorStop(1, 'rgba(240, 165, 0, 0)');
          ctx.fillStyle = ug;
          ctx.beginPath(); ctx.arc(userProj.x, userProj.y, Math.max(8, ur), 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(userProj.x, userProj.y, Math.max(2, 5 * userProj.scale * 0.5), 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(240, 165, 0, 0.5)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(userProj.x, userProj.y, Math.max(8, 16 * userProj.scale * 0.5), 0, Math.PI * 2); ctx.stroke();
        }
      }

      // Field labels (HTML-like text on canvas — kept simple here, SVG overlay does the rest)
      ctx.font = "10.5px 'JetBrains Mono', monospace";
      for (const item of fieldsProj) {
        if (!item.proj.visible) continue;
        if (cam.zoom < 0.55 && item.f.phase !== 'peak') continue;
        ctx.globalAlpha = item.dimmed ? 0.3 : Math.min(1, item.proj.scale * 0.8);
        ctx.fillStyle = item.cat.color;
        ctx.fillText(item.f.name, item.proj.x + 12, item.proj.y - 12);
        ctx.fillStyle = 'rgba(245,245,240,0.45)';
        ctx.font = "8.5px 'JetBrains Mono', monospace";
        ctx.fillText(item.f.cycle, item.proj.x + 12, item.proj.y + 0);
        ctx.font = "10.5px 'JetBrains Mono', monospace";
      }
      ctx.globalAlpha = 1;

      // Convergence labels
      for (const c of convList) {
        ctx.fillStyle = hexA(c.c.sev_color, 0.85);
        ctx.font = "9px 'JetBrains Mono', monospace";
        const txt = c.c.label.toUpperCase();
        const m = ctx.measureText(txt);
        ctx.fillStyle = 'rgba(8,8,12,0.7)';
        ctx.fillRect(c.x - m.width/2 - 4, c.y - 7, m.width + 8, 14);
        ctx.fillStyle = hexA(c.c.sev_color, 0.95);
        ctx.fillText(txt, c.x - m.width/2, c.y + 3);
      }

      // ─── Off-radar twinkle stars ───────────────────────────────
      // Aligned-to-your-interests but not in your immediate radar.
      // Faint pulse; brighten when cursor is near (handled in hover).
      const offRadar = G.OFF_RADAR || [];
      const offRadarProj = [];
      for (let oi = 0; oi < offRadar.length; oi++) {
        const o = offRadar[oi];
        const wp = { x: o.pos.x * SCALE * 1.6, y: o.pos.y * SCALE * 1.6, z: (o.pos.z || 0) * 380 };
        const op = project(wp, cam, width, height);
        if (!op.visible) continue;
        offRadarProj.push({ o, x: op.x, y: op.y, depth: op.depth });
        const cat = G.CATEGORY[o.domain] || { color: '#f5f5f0' };
        // Twinkle: 0..1 sine driven by per-star phase
        const phase = (oi * 1.7 + t * (0.7 + (oi % 3) * 0.3)) % (Math.PI * 2);
        const tw = 0.4 + Math.sin(phase) * 0.4 + Math.sin(phase * 2.3) * 0.2;
        const r = 0.8 + (1 / Math.max(0.0001, op.depth)) * 250;
        ctx.globalAlpha = clamp(tw * 0.55, 0.05, 0.55);
        ctx.fillStyle = cat.color;
        ctx.beginPath();
        ctx.arc(op.x, op.y, Math.max(0.6, r), 0, Math.PI * 2);
        ctx.fill();
        // Cross-flare on bright ticks
        if (tw > 0.65) {
          ctx.globalAlpha = (tw - 0.65) * 1.4;
          ctx.strokeStyle = cat.color;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(op.x - 4, op.y); ctx.lineTo(op.x + 4, op.y);
          ctx.moveTo(op.x, op.y - 4); ctx.lineTo(op.x, op.y + 4);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
      offRadarProjRef.current = offRadarProj;

      // ─── Comets / wonky bets ───────────────────────────────────
      // Streak across the field with motion-trail. Hover for a card,
      // click to read why this market exists.
      const cometsProj = [];
      for (const cm of cometsRef.current) {
        // Update position (slow drift across the universe)
        cm.x += cm.vx * dt * 60;
        cm.y += cm.vy * dt * 60;
        cm.z += cm.vz * dt * 60;
        // Wrap around
        if (Math.abs(cm.x) > 1500) cm.x *= -0.99;
        if (Math.abs(cm.y) > 1100) cm.y *= -0.99;
        if (Math.abs(cm.z) > 800)  cm.z *= -0.99;
        const pp = project(cm, cam, width, height);
        if (!pp.visible) continue;
        // Trail point (slightly behind)
        const trail = project({ x: cm.x - cm.vx * 12, y: cm.y - cm.vy * 12, z: cm.z - cm.vz * 12 }, cam, width, height);
        cometsProj.push({ cm, x: pp.x, y: pp.y, depth: pp.depth });
        const grad = ctx.createLinearGradient(pp.x, pp.y, trail.x || pp.x - 30, trail.y || pp.y);
        grad.addColorStop(0, 'rgba(245,245,240,0.95)');
        grad.addColorStop(0.4, 'rgba(245,200,140,0.45)');
        grad.addColorStop(1, 'rgba(245,200,140,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.2 + (cm.hovered ? 1.5 : 0);
        ctx.beginPath();
        ctx.moveTo(pp.x, pp.y);
        if (trail.visible) ctx.lineTo(trail.x, trail.y);
        ctx.stroke();
        // Bright head
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      cometsProjRef.current = cometsProj;

      // ─── Constellations / through-lines ──────────────────────────
      // Faint AI-suggested links between related stories.
      // ─── Constellations ──────────────────────────────────────────
      if (props.constellationsOn || hoverStory) {
        const projMap = {};
        for (const ps of allStoryProj) projMap[ps.id] = ps;
        ctx.save();

        for (const con of (G.CONSTELLATIONS || [])) {
          const hoveredIn = hoverStory && con.stories.includes(hoverStory.id);
          if (!props.constellationsOn && !hoveredIn) continue;
          const points = con.stories.map(id => projMap[id]).filter(Boolean);
          if (points.length < 2) continue;

          const col = con.color || '#b0a0e0';
          const alpha = props.constellationsOn ? (hoveredIn ? 1 : 0.72) : 0.85;

          // ── TYPE: causal — solid bright line with strong glow ──
          if (con.type === 'causal') {
            // Glow pass
            ctx.strokeStyle = hexA(col, 0.22 * alpha);
            ctx.lineWidth = 8;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);
            for (let pi = 1; pi < points.length; pi++) ctx.lineTo(points[pi]._x, points[pi]._y);
            ctx.stroke();
            // Core line
            ctx.strokeStyle = hexA(col, 0.85 * alpha);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);
            for (let pi = 1; pi < points.length; pi++) ctx.lineTo(points[pi]._x, points[pi]._y);
            ctx.stroke();
            // Arrow heads between consecutive points
            for (let pi = 0; pi < points.length - 1; pi++) {
              const ax = points[pi]._x, ay = points[pi]._y;
              const bx = points[pi+1]._x, by = points[pi+1]._y;
              const midX = (ax + bx) / 2, midY = (ay + by) / 2;
              const ang = Math.atan2(by - ay, bx - ax);
              ctx.save();
              ctx.translate(midX, midY); ctx.rotate(ang);
              ctx.fillStyle = hexA(col, 0.9 * alpha);
              ctx.beginPath();
              ctx.moveTo(8, 0); ctx.lineTo(-4, 4); ctx.lineTo(-4, -4);
              ctx.closePath(); ctx.fill();
              ctx.restore();
            }
          }
          // ── TYPE: correlated — dashed line, softer ──
          else if (con.type === 'correlated') {
            ctx.strokeStyle = hexA(col, 0.18 * alpha);
            ctx.lineWidth = 5;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);
            for (let pi = 1; pi < points.length; pi++) ctx.lineTo(points[pi]._x, points[pi]._y);
            ctx.stroke();
            ctx.strokeStyle = hexA(col, 0.70 * alpha);
            ctx.lineWidth = 1.2;
            ctx.setLineDash([6, 5]);
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);
            for (let pi = 1; pi < points.length; pi++) ctx.lineTo(points[pi]._x, points[pi]._y);
            ctx.stroke();
            ctx.setLineDash([]);
          }
          // ── TYPE: sequential — dotted, forward-moving ──
          else {
            ctx.strokeStyle = hexA(col, 0.14 * alpha);
            ctx.lineWidth = 4;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);
            for (let pi = 1; pi < points.length; pi++) ctx.lineTo(points[pi]._x, points[pi]._y);
            ctx.stroke();
            ctx.strokeStyle = hexA(col, 0.65 * alpha);
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 5]);
            ctx.lineDashOffset = -(t * 8) % 7; // animated march
            ctx.beginPath();
            ctx.moveTo(points[0]._x, points[0]._y);

// ────────────────────────────────────────────────────────────
// Deep dive — story interpretation card
// ────────────────────────────────────────────────────────────
function DeepDive({ story, onClose, savedStoryIds, toggleStorySave, onUntrack }) {
  const [stage, setStage] = React.useState(0);
  const stages = [
    'READING SIGNALS…',
    'PROCESSING MARKET DATA…',
    'CROSS-REFERENCING NEWS CONTEXT…',
    'FINALIZING INTERPRETATION…',
  ];
  React.useEffect(() => {
    if (!story) return;
    setStage(0);
    let i = 0;
    const id = setInterval(() => {
      i++;
      if (i >= stages.length) clearInterval(id);
      else setStage(i);
    }, 420);
    return () => clearInterval(id);
  }, [story?.id]);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  if (!story) return null;
  const cat = CATEGORY[story._domain];
  const ready = stage >= stages.length - 1;

  // generate a deterministic sparkline
  const spark = React.useMemo(() => {
    const out = []; let p = story.prob;
    for (let i = 0; i < 30; i++) {
      p += (Math.sin(i * 0.7 + story.prob) + (Math.random() - 0.5) * 0.4) * 1.5;
      out.push(Math.max(2, Math.min(98, p)));
    }
    out[out.length - 1] = story.prob;
    return out;
  }, [story.id]);

  return (
    <div className="deepdive-scrim" onClick={onClose}>
      <div className="deepdive" onClick={e => e.stopPropagation()}>
        <div className="dd-head">
          <div className="dd-tag" style={{ color: cat.color }}>
            <span className="dd-dot" style={{ background: cat.color }} />
            {story._fieldName} · {cat.label}
          </div>
          <button className="dd-close" onClick={onClose}>×</button>
        </div>
        <h1 className="dd-title">{story.name}</h1>
        <div className="dd-stat-row">
          <div className="dd-stat">
            <span className="k">MARKET PROB</span>
            <span className="v" style={{ color: cat.color }}>{story.prob}%</span>
          </div>
          <div className="dd-stat">
            <span className="k">VOLUME</span>
            <span className="v">{story.vol}</span>
          </div>
          <div className="dd-stat">
            <span className="k">URGENCY</span>
            <span className="v">{story.urgency.toUpperCase()}</span>
          </div>
          <div className="dd-stat">
            <span className="k">MAGNITUDE</span>
            <span className="v">{story.magnitude}</span>
          </div>
          {story.daysToClose != null && (
            <div className="dd-stat">
              <span className="k">CLOSES IN</span>
              <span className="v" style={{ color: story.daysToClose <= 7 ? '#ff4455' : story.daysToClose <= 30 ? '#F0A500' : '#aaa' }}>
                {story.daysToClose <= 0 ? 'NOW' : story.daysToClose + 'D'}
              </span>
            </div>
          )}
        </div>

        {!ready ? (
          <div className="dd-loading">
            {stages.map((s, i) => (
              <div key={i} className={'dd-stage' + (i <= stage ? ' on' : '')}>
                <span className="dd-stage-mark">{i < stage ? '✓' : i === stage ? '◐' : '○'}</span>
                <span>{s}</span>
              </div>
            ))}
          </div>
        ) : (
          <>
            <div className="dd-section">
              <div className="dd-label">PRIMARY READ</div>
              <p className="dd-prose">
                {story.name} is currently mispriced relative to news flow density. Capital is moving
                ahead of the consensus narrative — the divergence opened {Math.floor(Math.random() * 36 + 12)} hours ago
                and has held through {Math.floor(Math.random() * 8 + 3)} cycles of volatility.
              </p>
            </div>
            <div className="dd-spark">
              <svg width="100%" height="80" viewBox="0 0 300 80" preserveAspectRatio="none">
                <defs>
                  <linearGradient id={'g_' + story.id} x1="0" x2="0" y1="0" y2="1">
                    <stop offset="0%" stopColor={cat.color} stopOpacity="0.4" />
                    <stop offset="100%" stopColor={cat.color} stopOpacity="0" />
                  </linearGradient>
                </defs>
                <polyline
                  fill="none"
                  stroke={cat.color}
                  strokeWidth="1.3"
                  points={spark.map((v, i) => `${(i / (spark.length - 1)) * 300},${80 - (v / 100) * 76}`).join(' ')}
                />
                <polygon
                  fill={`url(#g_${story.id})`}
                  points={
                    spark.map((v, i) => `${(i / (spark.length - 1)) * 300},${80 - (v / 100) * 76}`).join(' ')
                    + ` 300,80 0,80`
                  }
                />
              </svg>
              <div className="dd-spark-axis">
                <span>30D AGO</span>
                <span>NOW</span>
              </div>
            </div>
            <div className="dd-section">
              <div className="dd-label">SOURCES IN ORBIT · {Math.floor(Math.random() * 18 + 8)}</div>
              <div className="dd-sources">
                {['REUTERS', 'BLOOMBERG', 'KALSHI', 'POLYMARKET', 'FT', 'NYT', 'AP'].slice(0, 5).map(s => (
                  <span key={s} className="dd-src">{s}</span>
                ))}
              </div>
            </div>
            <div className="dd-actions">
              <button
                className={'btn-primary' + (savedStoryIds.includes(story.id) ? ' saved' : '')}
                onClick={() => toggleStorySave(story.id)}
              >
                {savedStoryIds.includes(story.id) ? '★ TRACKING' : '☆ TRACK STORY'}
              </button>
              <button
                className="btn-ghost danger"
                onClick={() => { onUntrack && onUntrack(story.id); onClose(); }}

              >☓ UNTRACK</button>
              <button className="btn-ghost" onClick={onClose}>CLOSE</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
