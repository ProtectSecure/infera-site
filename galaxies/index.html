          onClick={speakMessage} title={speaking ? 'Stop speaking' : 'Read aloud'}
          style={{ marginLeft: 6 }}>
          {speaking ? '⏹' : '▶'}
        </button>
      </div>
      <form className="mc-row" onSubmit={submit} style={{ borderTop: '1px solid rgba(255,255,255,0.06)' }}>
        <input
          className="mc-input"
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder={listening ? '⬤ Listening… speak your query' : "Ask the universe — e.g. 'show overpriced bets'"}
        />
        <button type="button" className={'mc-icon-btn' + (listening ? ' listening' : '')} onClick={handleVoice} title={listening ? 'Stop listening' : 'Voice input'}>
          {listening ? '◉' : '◎'}
        </button>
        <button type="submit" className="mc-icon-btn" title="Submit">↵</button>
      </form>
      <div className="mc-meta-row">
        <div className="mc-verbosity">
          <span className="mc-verbosity-label">VERBOSITY</span>
          <input
            type="range" min="0" max="1" step="0.01"
            value={verbosity}
            onChange={e => setVerbosity(parseFloat(e.target.value))}
            className="mc-verbosity-slider"
          />
          <span className="mc-verbosity-tier">{tier}</span>
        </div>
        <span style={{ borderLeft: '1px solid var(--line)', paddingLeft: 14 }}>
          ⌘K · OPEN · TAB · SCAN
        </span>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────
// RADAR overlay — Probability × Coverage scatter
// X axis: probability (0..100). Y axis: coverage (sources/attention).
// Colored by category. Reveals overpriced / underpriced quadrants.
// ────────────────────────────────────────────────────────────
function RadarOverlay({ onClose, onStoryClick }) {
  const dots = React.useMemo(() => {
    const G = window.GALAXY;
    if (!G) return [];
    const all = [];
    for (const f of [...G.FIELDS, ...G.OUTSIDERS]) {
      for (const s of f.stories) {
        all.push({
          id: s.id, name: s.name, prob: s.prob,
          coverage: s.attention || s.magnitude || 18,
          color: G.CATEGORY[f.domain].color,
          domain: f.domain,
        });
      }
    }
    return all;
  }, []);
  const maxCov = dots.reduce((m, d) => Math.max(m, d.coverage), 1);

  return (
    <div className="radar-overlay">
      <div className="radar-head">
        <span className="radar-title">RADAR · PROB × COVERAGE</span>
        <button className="conv-panel-close" onClick={onClose} style={{ fontSize: 16 }}>×</button>
      </div>
      <div className="radar-canvas">
        <div className="radar-grid" />
        <div className="radar-quadrant-label" style={{ top: 6, left: 6 }}>UNDERPRICED · LOUD</div>
        <div className="radar-quadrant-label" style={{ top: 6, right: 6, textAlign: 'right' }}>CONSENSUS · LOUD</div>
        <div className="radar-quadrant-label" style={{ bottom: 6, left: 6 }}>QUIET LONGSHOT</div>
        <div className="radar-quadrant-label" style={{ bottom: 6, right: 6, textAlign: 'right' }}>QUIET FAVORITE</div>
        {dots.map(d => (
          <div
            key={d.id}
            className="radar-dot"
            title={`${d.name} · ${d.prob}% · cov ${d.coverage}`}
            style={{
              left: `${d.prob}%`,
              top: `${100 - (d.coverage / maxCov) * 100}%`,
              background: d.color,
              boxShadow: `0 0 6px ${d.color}, 0 0 14px ${d.color}66`,
            }}
            onClick={() => onStoryClick && onStoryClick(d.id)}
          />
        ))}
        <div className="radar-axes-label x">PROB →</div>
        <div className="radar-axes-label y">COVERAGE →</div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [query, setQuery] = React.useState('');
  // Multi-cat filter
  const [filterCats, setFilterCats] = React.useState(ALL_CATS);
  const [gravity, setGravity] = React.useState(0.45);
  const [signalVolume, setSignalVolume] = React.useState(8);
  const [timeHorizon, setTimeHorizon] = React.useState(0.4);
  const [capital, setCapital] = React.useState(0.5);
  const [editorial, setEditorial] = React.useState(false);
  const [hoverStory, setHoverStory] = React.useState(null);
  const [mouse, setMouse] = React.useState({ x: 0, y: 0 });
  const [deepStory, setDeepStory] = React.useState(null);
  const [savedSignals, setSavedSignals] = React.useState([]);
  const [savedStoryIds, setSavedStoryIds] = React.useState([]);
  const [untrackedIds, setUntrackedIds] = React.useState([]);
  const [supernovaTrigger, setSupernovaTrigger] = React.useState(null);
  const [sinceLastOpen, setSinceLastOpen] = React.useState(true);
  const [utc, setUtc] = React.useState('14:32');
  const [focusFieldId, setFocusFieldId] = React.useState(null);
  const [focusStoryId, setFocusStoryId] = React.useState(null);
  const [convergenceFocus, setConvergenceFocus] = React.useState(null);
  const [constellationsOn, setConstellationsOn] = React.useState(true);
  const [perspectiveMode, setPerspectiveMode] = React.useState('flight'); // 'flight' | 'egocentric'
  const [tractorField, setTractorField] = React.useState(null); // field being tractor-beamed
  const [verbosity, setVerbosity] = React.useState(0.5);
  const [radarOpen, setRadarOpen] = React.useState(false);
  const [mcOpen, setMcOpen] = React.useState(true);
  const stageRef = React.useRef(null);
  const [stageSize, setStageSize] = React.useState({ w: 800, h: 600 });

  // Apply accent
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  // UTC clock
  React.useEffect(() => {
    const tick = () => {
      const d = new Date();
      const hh = String(d.getUTCHours()).padStart(2, '0');
      const mm = String(d.getUTCMinutes()).padStart(2, '0');
      setUtc(`${hh}:${mm}`);
    };
    tick();
    const id = setInterval(tick, 30000);
    return () => clearInterval(id);
  }, []);

  // Stage resize
  React.useEffect(() => {
    const onResize = () => {
      if (!stageRef.current) return;
      const r = stageRef.current.getBoundingClientRect();
      setStageSize({ w: Math.floor(r.width), h: Math.floor(r.height) });
    };
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Track mouse for hover preview
  const onStageMouseMove = (e) => {
    if (!stageRef.current) return;
    const r = stageRef.current.getBoundingClientRect();
    setMouse({ x: e.clientX - r.left, y: e.clientY - r.top });
  };

  const counts = React.useMemo(() => {
    const c = { all: FIELDS.length };
    for (const f of FIELDS) c[f.domain] = (c[f.domain] || 0) + 1;
    return c;
  }, []);

  const toggleSaveSignal = (id) =>
    setSavedSignals(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const toggleStorySave = (id) =>
    setSavedStoryIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const toggleCat = (id) => {
    if (id === '__all__') {
      setFilterCats(ALL_CATS);
      return;
    }
    setFilterCats(prev => {
      if (prev.includes(id) && prev.length === 1) return prev; // can't go to zero
      return prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
    });
  };

  const handleOpenField = (fid) => {
    setConvergenceFocus(null);
    setFocusStoryId(null);
    setFocusFieldId(fid);
    // unsuppress its category
    const f = FIELDS.find(x => x.id === fid);
    if (f && !filterCats.includes(f.domain)) setFilterCats(prev => [...prev, f.domain]);
  };
  const handleConvergenceClick = (key) => {
    setFocusStoryId(null);
    setFocusFieldId(null);
    setConvergenceFocus(key);
  };
  const handleStoryClick = (s) => {
    if (!s) return;
    if (s.isSatellite) return; // satellites are visual-only for now
    setDeepStory(s);
    setFocusStoryId(s.id);
    setConvergenceFocus(null);
    setFocusFieldId(null);
  };
  const handleUntrack = (id) => {
    // Remove from saved if present
    setSavedStoryIds(prev => prev.filter(x => x !== id));
    setUntrackedIds(prev => prev.includes(id) ? prev : [...prev, id]);
    // If high-impact bet → supernova first, then sink
    const found = FIELDS.flatMap(f => f.stories.map(s => ({ s, f }))).find(x => x.s.id === id);
    if (found && found.s.magnitude >= 24) {
      setSupernovaTrigger({ id, t: Date.now() });
    }
  };

  const resetView = () => {
    setFocusStoryId(null);
    setFocusFieldId(null);
    setConvergenceFocus(null);
  };

  // Convergence info for sub-events panel
  const activeConvergence = React.useMemo(() => {
    if (!convergenceFocus) return null;
    return CONVERGENCES.find(c => `${c.a}::${c.b}` === convergenceFocus);
  }, [convergenceFocus]);

  return (
    <div className="app-shell">
      <ChromeHeader
        utc={utc} edition="021"
        query={query} setQuery={setQuery}
        filterCats={filterCats} toggleCat={toggleCat}
        allCats={ALL_CATS}
        counts={counts}
      />
      <LeftPanel
        editorial={editorial} setEditorial={setEditorial}
        savedSignals={savedSignals} savedStoryIds={savedStoryIds}
        sinceLastOpen={sinceLastOpen} setSinceLastOpen={setSinceLastOpen}
        constellationsOn={constellationsOn} setConstellationsOn={setConstellationsOn}
        perspectiveMode={perspectiveMode}
        setPerspectiveMode={(m) => { setPerspectiveMode(m); if (m !== 'egocentric') setTractorField(null); }}
      />
      <main className="galaxy-stage" ref={stageRef} onMouseMove={onStageMouseMove}>
        {stageSize.w > 0 && (
          <GalaxyCanvas
            width={stageSize.w} height={stageSize.h}
            gravity={gravity}
            signalVolume={signalVolume}
            timeHorizon={timeHorizon}
            capital={capital}
            editorial={editorial}
            hoverStory={hoverStory}
            setHoverStory={setHoverStory}
            onStoryClick={handleStoryClick}
            onFieldClick={(f) => handleOpenField(f.id)}
            onConvergenceClick={handleConvergenceClick}
            savedStoryIds={savedStoryIds}
            untrackedIds={untrackedIds}
            filterCats={filterCats}
            focusStoryId={focusStoryId}
            focusFieldId={focusFieldId}
            convergenceFocus={convergenceFocus}
            supernovaTrigger={supernovaTrigger}
            constellationsOn={constellationsOn}
            perspectiveMode={perspectiveMode}
            onTractorBeam={(field) => { setTractorField(field); }}
          />
        )}
        <SignalAlertPanel
          signals={DAILY_SIGNALS}
          savedSignals={savedSignals}
          toggleSave={toggleSaveSignal}
          onOpenField={handleOpenField}
        />
        <HoverPreview story={hoverStory} x={mouse.x} y={mouse.y} />
        {deepStory && (
          <DeepDive
            story={deepStory}
            onClose={() => { setDeepStory(null); setFocusStoryId(null); }}
            savedStoryIds={savedStoryIds}
            toggleStorySave={toggleStorySave}
            onUntrack={handleUntrack}
          />
        )}

        {/* Convergence sub-events overlay */}
        {activeConvergence && (
          <ConvergencePanel c={activeConvergence} onClose={resetView} onStoryClick={handleStoryClick} />
        )}

        {/* Tractor beam panel — shows when right-clicking a field in egocentric mode */}
        {tractorField && perspectiveMode === 'egocentric' && (
          <TractorPanel
            field={tractorField}
            onClose={() => setTractorField(null)}
            onExplore={() => {
              setPerspectiveMode('flight');
              setTractorField(null);
              handleOpenField(tractorField.id);
            }}
            onStoryClick={handleStoryClick}
            savedStoryIds={savedStoryIds}
          />
        )}

        {/* Egocentric mode hint */}
        {perspectiveMode === 'egocentric' && !tractorField && (
          <div className="ego-hint">RIGHT-CLICK A GALAXY · TRACTOR BEAM</div>
        )}

        {/* Editorial Mode banner */}
        {editorial && (
          <div className="editorial-banner">
            <span className="dot" /> EDITORIAL MODE · OBJECTIVE VIEW · PERSONAL GRAVITY DISABLED
          </div>
        )}

        {/* View navigator pills (top-left of stage) */}
        {(focusFieldId || focusStoryId || convergenceFocus) && (
          <button className="reset-view" onClick={resetView}>
            ← RETURN TO UNIVERSE
          </button>
        )}

        {/* Stage hint */}
        <div className="stage-hint">
          {perspectiveMode === 'egocentric' ? (
            <>
              <span>DRAG · look</span>
              <span>·</span>
              <span>WHEEL · pull closer</span>
              <span>·</span>
              <span>CLICK · open</span>
              <span>·</span>
              <span>RIGHT-CLICK · tractor beam</span>
            </>
          ) : (
            <>
              <span>DRAG · pan</span>
              <span>·</span>
              <span>SHIFT-DRAG · tilt</span>
              <span>·</span>
              <span>WHEEL · zoom</span>
              <span>·</span>
              <span>CLICK · open</span>
            </>
          )}
        </div>

        {/* RADAR toggle */}
        <button
          className={'radar-toggle' + (radarOpen ? ' on' : '')}
          onClick={() => setRadarOpen(o => !o)}
          title="Probability × Coverage scatter"
        >
          ◎ RADAR
        </button>
        {radarOpen && (
          <RadarOverlay
            onClose={() => setRadarOpen(false)}
            onStoryClick={(sid) => {
              // Find story object and open DeepDive
              for (const f of [...FIELDS, ...((window.GALAXY && window.GALAXY.OUTSIDERS) || [])]) {
                const found = f.stories.find(s => s.id === sid);
                if (found) {
                  handleStoryClick({ ...found, _domain: f.domain, _fieldId: f.id, _fieldName: f.name });
                  setRadarOpen(false);
                  return;
                }
              }
            }}
          />
        )}

        {/* Mission Control */}
        {mcOpen && (
          <MissionControl
            verbosity={verbosity}
            setVerbosity={setVerbosity}
            onSubmit={(q) => {
              // For now just push the query into the chrome search
              setQuery(q);
            }}
          />
        )}
      </main>
      <RightPanel
        gravity={gravity} setGravity={setGravity}
        signalVolume={signalVolume} setSignalVolume={setSignalVolume}
        timeHorizon={timeHorizon} setTimeHorizon={setTimeHorizon}
        capital={capital} setCapital={setCapital}
        editorial={editorial}
        onOpenField={handleOpenField}
        onConvergenceClick={handleConvergenceClick}
        filterCats={filterCats}
        toggleCat={toggleCat}
      />
      <EncodingFooter />

      <TweaksPanel title="INFERA Galaxy">
        <TweakSection label="Visual" />
        <TweakColor label="Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSlider label="Particle density" value={tweaks.particleDensity} min={0} max={2} step={0.1}
          onChange={v => setTweak('particleDensity', v)} />
        <TweakToggle label="Ambient motion" value={tweaks.ambientMotion} onChange={v => setTweak('ambientMotion', v)} />
        <TweakToggle label="Sweep arc" value={tweaks.showSweep} onChange={v => setTweak('showSweep', v)} />
        <TweakSection label="Camera" />
        <TweakSlider label="Weightless decay" value={tweaks.weightlessDecay} min={0.9} max={0.998} step={0.001}
          onChange={v => setTweak('weightlessDecay', v)} />
        <TweakSection label="Headlines" />
        <TweakRadio label="Font" value={tweaks.headlineFont}
          options={['serif', 'display', 'mono']}
          onChange={v => setTweak('headlineFont', v)} />
      </TweaksPanel>
    </div>
  );
}

// Convergence sub-events floating panel
function ConvergencePanel({ c, onClose, onStoryClick }) {
  const A = FIELDS.find(f => f.id === c.a), B = FIELDS.find(f => f.id === c.b);
  const cA = CATEGORY[A.domain], cB = CATEGORY[B.domain];

  const [panelPos, setPanelPos] = React.useState(null);
  const [collapsed, setCollapsed] = React.useState(false);
  const [isDragging, setIsDragging] = React.useState(false);
  const dragStartRef = React.useRef(null);
  const panelRef = React.useRef(null);

  React.useEffect(() => {
    if (!isDragging) return;
    const onMove = (e) => {
      if (!dragStartRef.current) return;
      setPanelPos({
        x: dragStartRef.current.originX + (e.clientX - dragStartRef.current.startX),
        y: dragStartRef.current.originY + (e.clientY - dragStartRef.current.startY),
      });
    };
    const onUp = () => setIsDragging(false);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    return () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
  }, [isDragging]);

  const onDragStart = (e) => {
    if (e.button !== 0) return;
    const rect = panelRef.current.getBoundingClientRect();
    dragStartRef.current = { startX: e.clientX, startY: e.clientY, originX: rect.left, originY: rect.top };
    setIsDragging(true);
    e.preventDefault();
  };

  const posStyle = panelPos
    ? { left: panelPos.x, top: panelPos.y, transform: 'none' }
    : { left: '50%', top: 80, transform: 'translateX(-50%)' };

  const linked = c.linked_items || [];
  const colorFor = (item) => {
    for (const f of FIELDS) {
      if (f.stories.find(s => s.id === item.storyId)) return CATEGORY[f.domain]?.color || c.sev_color;
    }
    return c.sev_color;
  };
  const handleItemClick = (item) => {
    if (!item.storyId) return;
    for (const f of FIELDS) {
      const s = f.stories.find(s => s.id === item.storyId);
      if (s) { onStoryClick && onStoryClick({ ...s, _domain: f.domain, _fieldName: f.name, _fieldId: f.id }); onClose(); return; }
    }
  };

  const avgProb = linked.length ? Math.round(linked.reduce((s, x) => s + (parseInt(x.stat) || 50), 0) / linked.length) : 50;

  const mcSummaries = {
    trajectory: c.trajectory
      ? `Mission Control: The ${c.zone} zone is trending ${c.trajectory.toLowerCase()}. Both ${A.name} and ${B.name} appear to be converging toward a shared resolution window — watch for velocity changes in the next 7 days.`
      : `Mission Control: Trajectory data is still accumulating. Check back as more events resolve in this quadrant.`,
    markets: linked.length > 0
      ? `Mission Control: ${linked.length} linked market${linked.length > 1 ? 's' : ''} active in this convergence zone. Average probability sits at ${avgProb}% — ${avgProb > 60 ? 'high conviction across the cluster' : avgProb < 40 ? 'still contested — divergence risk is elevated' : 'moderate consensus, worth monitoring for a break'}.`
      : `Mission Control: No linked markets have been mapped for this convergence yet.`,
    events: `Mission Control: ${c.sub_events.length} cyclical event${c.sub_events.length !== 1 ? 's' : ''} tracked in this quadrant. Recurring patterns suggest these catalysts fire every ${A.cycle || '30–90 days'} — time your positions accordingly.`,
    fields: `Mission Control: ${A.name} (${A.cycle}) and ${B.name} (${B.cycle}) operate on overlapping cycles. Convergence probability peaks when both fields are mid-cycle — current overlap is flagged ${c.severity}.`,
  };

  const speakBrief = () => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const text = [
      `Convergence brief for ${c.label}.`,
      mcSummaries.trajectory,
      mcSummaries.markets,
      mcSummaries.events,
      mcSummaries.fields,
    ].join(' ');
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.92; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  };

  return (
    <div ref={panelRef} className={'conv-panel' + (collapsed ? ' conv-collapsed' : '')} style={posStyle}>
      <div className="conv-panel-head">
        <div className="conv-drag-handle" onPointerDown={onDragStart}>
          <div className="conv-panel-tag" style={{ color: c.sev_color }}>
            <span className="conv-panel-dots">
              <span style={{ background: cA.color }} />
              <span style={{ background: cB.color }} />
            </span>
            CONVERGENCE ZONE · {c.severity}
          </div>
        </div>
        <button className="conv-collapse-btn" onClick={() => setCollapsed(v => !v)} title={collapsed ? 'Expand' : 'Collapse'}>
          {collapsed ? '▼ EXPAND' : '▲ COLLAPSE'}
        </button>
        <button className="conv-panel-close" onClick={onClose}>×</button>
      </div>
      <div className="conv-panel-body">
        <h2 className="conv-panel-title">{c.label}</h2>
        <div className="conv-panel-zone">{c.zone}</div>
        {c.trajectory && (
          <div className="conv-trajectory">
            <span className="conv-trajectory-arrow">↗</span>
            <span>30D: {c.trajectory}</span>
          </div>
        )}
        <div className="conv-panel-section" style={{ paddingBottom: 6 }}>
          <div className="conv-panel-eyebrow">TRAJECTORY · MISSION CONTROL</div>
          <div className="mc-summary">{mcSummaries.trajectory}</div>
        </div>
        <div className="conv-panel-divider" />
        {linked.length > 0 && (
          <div className="conv-panel-section">
            <div className="conv-panel-eyebrow">LINKED MARKETS · CLICK TO OPEN</div>
            <div className="mc-summary">{mcSummaries.markets}</div>
            <ul className="conv-linked-items">
              {linked.map((item, i) => {
                const col = colorFor(item);
                return (
                  <li key={i} className="conv-linked-item" style={{ borderLeftColor: col }} onClick={() => handleItemClick(item)}>
                    <div className="conv-linked-item-left">
                      <span className="conv-linked-item-num" style={{ color: col }}>{String(i+1).padStart(2,'0')}</span>
                      <span className="conv-linked-item-label">{item.label}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span className="conv-linked-item-stat" style={{ color: col }}>{item.stat}</span>
                      <span className="conv-linked-item-cta">OPEN →</span>
                    </div>
                  </li>
                );
              })}
            </ul>
          </div>
        )}
        <div className="conv-panel-divider" />
        <div className="conv-panel-section">
          <div className="conv-panel-eyebrow">CYCLICAL EVENTS IN THIS QUADRANT</div>
          <div className="mc-summary">{mcSummaries.events}</div>
          <ul className="conv-panel-events">
            {c.sub_events.map((ev, i) => (
              <li key={i}>
                <span className="ev-num">{String(i+1).padStart(2,'0')}</span>
                <span>{ev}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="conv-panel-section">
          <div className="conv-panel-eyebrow">FIELDS</div>
          <div className="mc-summary">{mcSummaries.fields}</div>
          <div className="conv-panel-fields">
            <div className="cpf" style={{ borderLeftColor: cA.color }}>
              <div className="cpf-name">{A.name}</div>
              <div className="cpf-cycle">{A.cycle}</div>
            </div>
            <div className="cpf" style={{ borderLeftColor: cB.color }}>
              <div className="cpf-name">{B.name}</div>
              <div className="cpf-cycle">{B.cycle}</div>
            </div>
          </div>
        </div>
        <button className="conv-speak-btn" onClick={speakBrief} title="Read brief aloud">
          ◎ SPEAK BRIEF
        </button>
        <button className="conv-brief-btn" onClick={() => {}}>
          OPEN FULL BRIEF →
        </button>
      </div>
    </div>
  );
}

// Tractor beam panel — appears when right-clicking a field in egocentric mode
function TractorPanel({ field, onClose, onExplore, onStoryClick, savedStoryIds }) {
  const cat = CATEGORY[field.domain] || {};
  const relatedConvs = CONVERGENCES.filter(c => c.a === field.id || c.b === field.id);
  const topStories = (field.stories || []).slice(0, 4);

  return (
    <div className="tractor-panel">
      <div className="tractor-panel-beam-indicator">
        <span className="tractor-beam-dot" style={{ background: cat.color }} />
        <span style={{ color: cat.color }}>TRACTOR BEAM LOCKED</span>
        <button className="conv-panel-close" onClick={onClose}>×</button>
      </div>
      <div className="tractor-panel-field">
        <span className="tractor-panel-domain" style={{ color: cat.color }}>{cat.label}</span>
        <h2 className="tractor-panel-name">{field.name}</h2>
        {field.cycle && <div className="tractor-panel-cycle">{field.cycle}</div>}
      </div>

      {topStories.length > 0 && (
        <div className="tractor-panel-section">
          <div className="conv-panel-eyebrow">LIVE BETS IN THIS GALAXY</div>
          <ul className="tractor-stories">
            {topStories.map(s => (
              <li key={s.id} className="tractor-story-item" onClick={() => {
                onStoryClick && onStoryClick({ ...s, _domain: field.domain, _fieldName: field.name, _fieldId: field.id });
                onClose();
              }}>
                <div className="tractor-story-prob" style={{ color: cat.color }}>{s.prob}%</div>
                <div className="tractor-story-name">{s.name}</div>
                {s.daysToClose != null && (
                  <div className="tractor-story-close" style={{ color: s.daysToClose <= 7 ? '#ff4455' : '#888' }}>
                    {s.daysToClose}D
                  </div>
                )}
              </li>
            ))}
          </ul>
        </div>
      )}

      {relatedConvs.length > 0 && (
        <div className="tractor-panel-section">
          <div className="conv-panel-eyebrow">CONVERGENCE ZONES · COMMON GROUND</div>
          <ul className="tractor-convs">
            {relatedConvs.map(c => {
              const otherId = c.a === field.id ? c.b : c.a;
              const other = FIELDS.find(f => f.id === otherId);
              const otherCat = other ? (CATEGORY[other.domain] || {}) : {};
              return (
                <li key={`${c.a}::${c.b}`} className="tractor-conv-item">
                  <span className="tractor-conv-dot" style={{ background: otherCat.color }} />
                  <div>
                    <div className="tractor-conv-label">{c.label}</div>
                    {other && <div className="tractor-conv-other" style={{ color: otherCat.color }}>{other.name}</div>}
                  </div>
                  <div className="tractor-conv-sev" style={{ color: c.sev_color }}>{c.severity}</div>
                </li>
              );
            })}
          </ul>
        </div>
      )}

      <div className="tractor-panel-actions">
        <button className="btn-primary" style={{ background: cat.color, borderColor: cat.color, color: '#000' }} onClick={onExplore}>
          GO EXPLORE →
        </button>
        <button className="btn-ghost" onClick={onClose}>RELEASE BEAM</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

})();
</script>
</body>
</html>
