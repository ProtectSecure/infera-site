<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INFERA — Narrative Physics Galaxy</title>
<meta name="viewport" content="width=1440, initial-scale=1">
<style>/* INFERA Galaxy — full-bleed cinematic universe */

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base: #07070b;
  --bg-elev: #0e0e14;
  --bg-overlay: rgba(14, 14, 20, 0.78);
  --line: rgba(245,245,240,0.08);
  --line-strong: rgba(245,245,240,0.16);
  --fg: #f5f5f0;
  --fg-2: rgba(245,245,240,0.62);
  --fg-3: rgba(245,245,240,0.38);
  --accent: #F0A500;
  --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  --display: 'Bebas Neue', 'Helvetica Neue', sans-serif;
  --serif: 'EB Garamond', Georgia, serif;
}

html, body, #root { height: 100%; width: 100%; }
body {
  background: var(--bg-base);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: auto;
  min-width: 1280px;
}

/* Background star fields */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(155,89,182,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 70%, rgba(74,144,226,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, rgba(240,165,0,0.04) 0%, transparent 30%),
    var(--bg-base);
  pointer-events: none;
  z-index: 0;
}

.app-shell {
  position: relative;
  height: 100vh;
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  grid-template-rows: 56px 1fr 40px;
  z-index: 1;
}

/* ───────── Header ───────── */
.chrome {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(to bottom, rgba(14,14,20,0.85), rgba(14,14,20,0.55));
  backdrop-filter: blur(8px);
  z-index: 50;
}
.chrome-left { display: flex; align-items: center; gap: 24px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  font-family: var(--display);
  letter-spacing: 0.18em;
  font-size: 22px;
  color: var(--fg);
}
.brand-sub {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--accent);
  border-left: 1px solid var(--line-strong);
  padding-left: 10px;
  font-weight: 500;
}
.edition {
  display: flex; gap: 8px;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--fg-3);
}

.chrome-center { display: flex; align-items: center; gap: 18px; flex: 1; justify-content: center; }
.searchbox {
  display: flex; align-items: center;
  width: 360px; height: 30px;
  padding: 0 10px;
  background: rgba(20,20,26,0.7);
  border: 1px solid var(--line);
  position: relative;
}
.searchbox:focus-within { border-color: rgba(240,165,0,0.4); }
.search-icon { color: var(--fg-3); margin-right: 8px; font-size: 13px; }
.searchbox input {
  flex: 1;
  background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 11px; color: var(--fg);
  letter-spacing: 0.04em;
}
.searchbox input::placeholder { color: var(--fg-3); }
.searchbox kbd {
  font-family: var(--mono); font-size: 9px;
  border: 1px solid var(--line-strong); padding: 2px 5px;
  color: var(--fg-2);
}

.filters { display: flex; gap: 4px; }
.filter-pill {
  display: flex; align-items: center; gap: 6px;
  height: 26px; padding: 0 10px;
  background: rgba(20,20,26,0.5);
  border: 1px solid var(--line);
  color: var(--fg-2);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.filter-pill:hover { border-color: var(--cat); color: var(--fg); }
.filter-pill.active {
  border-color: var(--cat);
  color: var(--fg);
  background: color-mix(in oklab, var(--cat) 10%, transparent);
  box-shadow: 0 0 12px color-mix(in oklab, var(--cat) 25%, transparent);
}
.filter-pill .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--cat);
  box-shadow: 0 0 6px var(--cat);
}
.filter-pill .ct { color: var(--fg-3); font-size: 9px; }

.chrome-right { display: flex; align-items: center; gap: 14px; }
.live-indicator { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.18em; }
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #4CB963;
  box-shadow: 0 0 8px #4CB963;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
.utc { color: var(--fg-3); }

/* ───────── Left panel ───────── */
.left-panel {
  border-right: 1px solid var(--line);
  background: linear-gradient(to right, rgba(14,14,20,0.6), rgba(14,14,20,0.3));
  overflow-y: auto;
  padding: 18px 16px 18px 18px;
  display: flex; flex-direction: column;
  gap: 18px;
}
.lp-section { display: flex; flex-direction: column; gap: 8px; }
.lp-eyebrow {
  font-size: 9px; letter-spacing: 0.22em; color: var(--accent);
  font-weight: 500;
}
.legend { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.legend li { display: flex; gap: 10px; align-items: flex-start; }
.legend-glyph {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  margin-top: 2px;
}
.legend-glyph.node { background: #fff; box-shadow: 0 0 8px rgba(240,165,0,0.6); width: 8px; height: 8px; margin-top: 7px; margin-left: 5px; }
.legend-glyph.dashed {
  background: none;
  border-top: 1px dashed var(--accent);
  border-radius: 0;
  width: 18px; height: 1px; margin-top: 8px;
}
.legend-title { font-size: 10px; letter-spacing: 0.12em; color: var(--fg); font-weight: 500; }
.legend-desc { font-size: 10px; color: var(--fg-2); margin-top: 1px; line-height: 1.45; }

.howto { list-style: none; display: flex; flex-direction: column; gap: 6px; font-size: 10.5px; color: var(--fg-2); }
.howto li { display: flex; gap: 8px; align-items: flex-start; line-height: 1.45; }
.howto .howto-num {
  font-family: var(--display); font-size: 13px;
  color: var(--accent); letter-spacing: 0;
  width: 14px; flex-shrink: 0;
}
.howto .howto-text { flex: 1; min-width: 0; }

.since-last { background: rgba(240,165,0,0.04); border: 1px solid rgba(240,165,0,0.14); padding: 10px; }
.since-toggle {
  display: flex; align-items: center; gap: 8px;
  background: none; border: none; cursor: pointer;
  width: 100%; color: var(--fg);
  font-family: var(--mono);
}
.since-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.since-title { font-size: 10px; letter-spacing: 0.18em; color: var(--accent); flex: 1; text-align: left; font-weight: 500; }
.since-count { font-size: 10px; color: var(--fg-3); }
.since-chev { font-size: 10px; color: var(--fg-3); }
.since-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.since-list li { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; font-size: 10px; align-items: baseline; padding-bottom: 6px; border-bottom: 1px dashed var(--line); }
.since-list li:last-child { border-bottom: none; padding-bottom: 0; }
.since-tag { font-size: 8px; letter-spacing: 0.18em; font-weight: 600; }
.since-text { color: var(--fg-2); line-height: 1.4; }
.since-when { color: var(--fg-3); font-size: 9px; }

.editorial-toggle {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 10px;
  background: rgba(20,20,26,0.6); border: 1px solid var(--line);
  cursor: pointer;
  font-family: var(--mono);
  text-align: left;
}
.editorial-toggle:hover { border-color: var(--line-strong); }
.editorial-toggle.on { border-color: rgba(240,165,0,0.5); background: rgba(240,165,0,0.08); }
.editorial-pill { width: 28px; height: 14px; background: rgba(245,245,240,0.1); border-radius: 8px; position: relative; flex-shrink: 0; }
.editorial-pill span { position: absolute; top: 2px; left: 2px; width: 10px; height: 10px; background: var(--fg-2); border-radius: 50%; transition: all .2s; }
.editorial-toggle.on .editorial-pill { background: rgba(240,165,0,0.3); }
.editorial-toggle.on .editorial-pill span { left: 16px; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.editorial-title { font-size: 10px; letter-spacing: 0.16em; color: var(--fg); font-weight: 500; }
.editorial-desc { font-size: 9.5px; color: var(--fg-2); margin-top: 2px; }

.lp-tally { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--line); padding-top: 10px; }
.lp-tally div { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.lp-tally span { font-size: 8px; letter-spacing: 0.18em; color: var(--fg-3); }
.lp-tally strong { font-family: var(--display); font-size: 18px; color: var(--accent); letter-spacing: 0.04em; }

/* ───────── Galaxy stage ───────── */
.galaxy-stage {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at center, rgba(20,15,30,0.6) 0%, var(--bg-base) 70%);
}

/* ───────── Right panel ───────── */
.right-panel {
  border-left: 1px solid var(--line);
  background: linear-gradient(to left, rgba(14,14,20,0.6), rgba(14,14,20,0.3));
  overflow-y: auto;
  padding: 18px 16px;
  display: flex; flex-direction: column;
  gap: 22px;
}
.rp-live-counter {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(240,165,0,0.08), rgba(240,165,0,0.03));
  border: 1px solid rgba(240,165,0,0.18);
  border-radius: 8px;
  font-family: var(--mono); font-size: 9.5px;
}
.rp-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4CB963;
  box-shadow: 0 0 8px #4CB963;
  animation: pulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.rp-live-showing { color: var(--fg-3); letter-spacing: 0.14em; }
.rp-live-num { font-family: var(--display); font-size: 18px; color: var(--fg); line-height: 1; }
.rp-live-of { color: var(--fg-3); letter-spacing: 0.10em; }
.rp-live-label { color: var(--accent); letter-spacing: 0.18em; font-weight: 500; font-size: 9px; }
.rp-section { display: flex; flex-direction: column; gap: 10px; }
.rp-eyebrow { font-size: 9px; letter-spacing: 0.22em; color: var(--accent); font-weight: 500; }
.rp-sub { color: var(--fg-3); }

.slider-row { display: flex; flex-direction: column; gap: 4px; }
.slider-row.disabled { opacity: 0.35; pointer-events: none; }
.slider-head { display: flex; justify-content: space-between; align-items: baseline; }
.slider-label { font-size: 9.5px; letter-spacing: 0.16em; color: var(--fg-2); font-weight: 500; }
.slider-value { font-family: var(--mono); font-size: 10px; color: var(--accent); }
.slider-row input[type="range"] {
  appearance: none; -webkit-appearance: none;
  width: 100%; height: 2px;
  background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct), rgba(245,245,240,0.12) var(--pct), rgba(245,245,240,0.12) 100%);
  outline: none;
  cursor: pointer;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  appearance: none; -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  cursor: grab;
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
  cursor: grab;
}
.slider-foot { display: flex; justify-content: space-between; font-size: 8.5px; color: var(--fg-3); letter-spacing: 0.14em; margin-top: 2px; }

.convergences { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.conv-item {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(20,20,26,0.45);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all .15s;
}
.conv-item:hover { background: rgba(20,20,26,0.85); border-color: var(--line-strong); }
.conv-icon { display: flex; }
.conv-icon span { width: 10px; height: 10px; border-radius: 50%; }
.conv-icon span:nth-child(2) { margin-left: -4px; }
.conv-label { font-size: 10px; color: var(--fg); letter-spacing: 0.06em; }
.conv-zone { font-size: 9px; color: var(--fg-3); margin-top: 2px; letter-spacing: 0.10em; }
.conv-sev { font-size: 9px; letter-spacing: 0.18em; font-weight: 600; }

.cycle-filters { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.cycle-filters li { display: flex; align-items: center; gap: 8px; }
.cycle-filters input { accent-color: var(--accent); cursor: pointer; }
.cycle-filters label { font-size: 10px; color: var(--fg-2); letter-spacing: 0.05em; cursor: pointer; }

/* ───────── Footer encoding legend ───────── */
.encoding-footer {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 18px;
  border-top: 1px solid var(--line);
  background: rgba(14,14,20,0.7);
  backdrop-filter: blur(6px);
  font-size: 9px;
  letter-spacing: 0.16em;
}
.ef-item { display: flex; align-items: center; gap: 6px; color: var(--fg-3); }
.ef-live {
  display: flex; align-items: center; gap: 7px;
  margin-left: auto;
  padding: 4px 12px;
  border-left: 1px solid var(--line);
}
.ef-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4CB963;
  box-shadow: 0 0 8px #4CB963, 0 0 14px rgba(76,185,99,0.45);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 0.55; transform: scale(0.85); }
  50% { opacity: 1; transform: scale(1.05); }
}
.ef-live-count {
  font-family: 'JetBrains Mono', monospace;
  color: #f5f5f0; font-weight: 600; font-size: 10.5px;
  letter-spacing: 0.04em;
}
.ef-live-label { color: var(--fg-2); font-size: 9px; }
.ef-glyph { color: var(--accent); font-size: 11px; }
.ef-k { color: var(--fg-2); font-weight: 500; }
.ef-eq { color: var(--fg-3); }
.ef-v { color: var(--fg-2); }

/* ───────── Signal Alert (top-right floating) ───────── */
.signal-panel {
  position: absolute;
  top: 18px; right: 18px;
  width: 360px;
  background: linear-gradient(to bottom, rgba(20,20,26,0.92), rgba(14,14,20,0.92));
  border: 1px solid rgba(240,165,0,0.25);
  box-shadow: 0 0 24px rgba(0,0,0,0.5), 0 0 60px rgba(240,165,0,0.06);
  backdrop-filter: blur(10px);
  z-index: 30;
  display: flex; flex-direction: column;
}
.signal-panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(240,165,0,0.16);
}
.signal-panel-title { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.22em; color: var(--accent); font-weight: 600; }
.signal-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.4s infinite; }
.signal-meta { color: var(--fg-3); letter-spacing: 0.14em; }
.signal-panel-actions button { background: none; border: 1px solid var(--line-strong); color: var(--fg-2); width: 22px; height: 22px; cursor: pointer; font-family: var(--mono); }
.signal-panel-actions button:hover { color: var(--fg); border-color: var(--accent); }

.signal-panel-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.signal-tier { display: flex; align-items: center; gap: 8px; font-size: 9.5px; letter-spacing: 0.22em; font-weight: 600; }
.tier-bullet { width: 8px; height: 8px; }
.tier-ts { color: var(--fg-3); margin-left: auto; letter-spacing: 0.14em; }

.signal-headline {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
  font-size: 22px;
  line-height: 1.18;
  color: var(--fg);
  letter-spacing: -0.005em;
  text-wrap: balance;
}
.signal-why {
  font-size: 11px;
  color: var(--fg-2);
  line-height: 1.55;
  border-left: 2px solid rgba(240,165,0,0.3);
  padding-left: 10px;
}
.why-label {
  display: block;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.22em;
  color: var(--accent);
  margin-bottom: 4px;
  font-weight: 600;
}

.signal-meta-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 8px 0; }
.meta-cell { display: flex; flex-direction: column; gap: 2px; padding: 0 6px; border-right: 1px solid var(--line); }
.meta-cell:last-child { border-right: none; }
.meta-k { font-size: 8px; letter-spacing: 0.22em; color: var(--fg-3); }
.meta-v { font-family: var(--display); font-size: 16px; letter-spacing: 0.04em; color: var(--fg); }

.signal-actions { display: flex; gap: 6px; }
.btn-primary {
  flex: 1;
  height: 32px;
  background: var(--accent); color: #07070b;
  border: none;
  font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
}
.btn-primary:hover { background: #ffb91d; box-shadow: 0 0 12px rgba(240,165,0,0.4); }
.btn-primary.saved { background: rgba(240,165,0,0.2); color: var(--accent); border: 1px solid var(--accent); }
.btn-ghost {
  height: 32px; padding: 0 14px;
  background: rgba(20,20,26,0.6);
  border: 1px solid var(--line-strong); color: var(--fg-2);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  cursor: pointer;
}
.btn-ghost:hover { color: var(--fg); border-color: var(--accent); }
.btn-ghost.saved { color: var(--accent); border-color: var(--accent); }

.signal-pager { display: flex; border-top: 1px solid var(--line); }
.pager-dot {
  flex: 1; padding: 8px 6px;
  background: none; border: none; border-right: 1px solid var(--line);
  cursor: pointer; color: var(--fg-3);
  font-family: var(--mono);
  display: flex; flex-direction: column; gap: 2px;
  align-items: flex-start;
  transition: all .15s;
}
.pager-dot:last-child { border-right: none; }
.pager-dot:hover { background: rgba(240,165,0,0.06); color: var(--fg-2); }
.pager-dot.active { background: rgba(240,165,0,0.1); color: var(--accent); }
.pager-num { font-size: 9px; letter-spacing: 0.18em; }
.pager-tag { font-size: 8px; letter-spacing: 0.16em; }

.signal-fab {
  position: absolute; top: 18px; right: 18px;
  display: flex; align-items: center; gap: 8px;
  height: 32px; padding: 0 14px;
  background: rgba(240,165,0,0.15);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; font-weight: 600;
  cursor: pointer;
  z-index: 30;
}
.signal-fab:hover { background: rgba(240,165,0,0.25); }
.signal-fab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.4s infinite; }

/* ───────── Hover preview ───────── */
.hover-preview {
  position: absolute;
  pointer-events: none;
  background: rgba(8,8,12,0.96);
  border: 1px solid rgba(245,245,240,0.18);
  padding: 10px 12px;
  min-width: 200px;
  z-index: 25;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
.hp-tag { display: flex; align-items: center; gap: 6px; font-size: 9px; letter-spacing: 0.18em; font-weight: 600; }
.hp-dot { width: 6px; height: 6px; border-radius: 50%; }
.hp-name { font-family: var(--display); font-size: 18px; letter-spacing: 0.06em; margin-top: 4px; }
.hp-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
.hp-stats div { display: flex; flex-direction: column; }
.hp-stats span { font-size: 8px; letter-spacing: 0.16em; color: var(--fg-3); }
.hp-stats strong { font-family: var(--mono); font-size: 11px; color: var(--fg); margin-top: 2px; font-weight: 500; }
.hp-stats strong.urg-high { color: #C44569; }
.hp-stats strong.urg-mid { color: var(--accent); }
.hp-stats strong.urg-low { color: var(--fg-2); }
.hp-countdown { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; font-weight: 600; margin-top: 6px; }
.hp-cta { font-size: 8px; letter-spacing: 0.22em; color: var(--accent); margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--line-strong); }

/* ───────── Deep dive ───────── */
.deepdive-scrim {
  position: absolute; inset: 0;
  background: rgba(7,7,11,0.85);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .2s ease-out;
}
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.deepdive {
  width: 540px; max-width: 90%;
  max-height: 85vh; overflow-y: auto;
  background: linear-gradient(to bottom, #0e0e14, #07070b);
  border: 1px solid var(--line-strong);
  padding: 26px 30px;
  box-shadow: 0 0 80px rgba(240,165,0,0.08), 0 20px 60px rgba(0,0,0,0.7);
  position: relative;
}
.dd-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.dd-tag { display: flex; align-items: center; gap: 8px; font-size: 9.5px; letter-spacing: 0.22em; font-weight: 600; }
.dd-dot { width: 7px; height: 7px; border-radius: 50%; }
.dd-close { background: none; border: 1px solid var(--line); color: var(--fg-2); width: 26px; height: 26px; cursor: pointer; font-size: 18px; line-height: 1; }
.dd-close:hover { color: var(--fg); border-color: var(--accent); }

.dd-title {
  font-family: var(--display);
  font-size: 44px;
  letter-spacing: 0.04em;
  color: var(--fg);
  line-height: 1;
  margin-bottom: 14px;
}

.dd-stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line); padding: 10px 0; margin-bottom: 18px; }
.dd-stat { display: flex; flex-direction: column; gap: 2px; padding: 0 14px; border-right: 1px solid var(--line); }
.dd-stat:last-child { border-right: none; }
.dd-stat .k { font-size: 8.5px; letter-spacing: 0.22em; color: var(--fg-3); }
.dd-stat .v { font-family: var(--display); font-size: 22px; letter-spacing: 0.04em; color: var(--fg); }

.dd-loading { display: flex; flex-direction: column; gap: 10px; padding: 30px 0; }
.dd-stage { display: flex; align-items: center; gap: 10px; font-size: 10.5px; letter-spacing: 0.18em; color: var(--fg-3); transition: color .2s; }
.dd-stage.on { color: var(--fg); }
.dd-stage-mark { font-size: 12px; color: var(--accent); width: 14px; }

.dd-section { margin-bottom: 18px; }
.dd-label { font-size: 9px; letter-spacing: 0.22em; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
.dd-prose { font-family: var(--serif); font-size: 16px; line-height: 1.55; color: var(--fg); text-wrap: pretty; }

.dd-spark { margin-bottom: 18px; }
.dd-spark-axis { display: flex; justify-content: space-between; font-size: 8.5px; letter-spacing: 0.18em; color: var(--fg-3); margin-top: 4px; }

.dd-sources { display: flex; flex-wrap: wrap; gap: 6px; }
.dd-src { font-size: 9px; letter-spacing: 0.16em; color: var(--fg-2); padding: 3px 8px; border: 1px solid var(--line); }

.dd-actions { display: flex; gap: 8px; margin-top: 18px; }
.dd-actions .btn-primary, .dd-actions .btn-ghost { flex: 1; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(245,245,240,0.1); }
::-webkit-scrollbar-thumb:hover { background: rgba(245,245,240,0.18); }

/* Editorial mode banner */
.editorial-banner {
  position: absolute;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px;
  background: rgba(20,20,26,0.92);
  border: 1px solid rgba(240,165,0,0.35);
  font-size: 10px; letter-spacing: 0.22em;
  color: var(--accent);
  z-index: 28;
}
.editorial-banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.4s infinite; }

.stage-hint {
  position: absolute;
  bottom: 16px; right: 18px;
  display: flex; gap: 12px;
  font-size: 9px; letter-spacing: 0.22em;
  color: var(--fg-3);
  pointer-events: none;
}

/* Tweaks panel sits inside via host protocol — keep z-index low enough */


/* ─── v2 additions ─── */

.reset-view {
  position: absolute;
  top: 18px; left: 18px;
  background: rgba(20,20,26,0.92);
  border: 1px solid var(--line-strong);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  padding: 8px 14px;
  cursor: pointer;
  z-index: 25;
  transition: all 0.15s;
}
.reset-view:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(240,165,0,0.18);
}

.btn-ghost.danger { color: rgba(196,69,105,0.85); }
.btn-ghost.danger:hover { border-color: rgba(196,69,105,0.5); color: #C44569; background: rgba(196,69,105,0.08); }

/* Cycle filters with category color */
.cycle-filters { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.cycle-filters li { display: flex; align-items: center; gap: 8px; }
.cycle-filters input[type=checkbox] { appearance: none; width: 14px; height: 14px; border: 1px solid var(--line-strong); background: rgba(20,20,26,0.6); cursor: pointer; position: relative; }
.cycle-filters input[type=checkbox]:checked { background: var(--cat, var(--accent)); border-color: var(--cat, var(--accent)); box-shadow: 0 0 6px var(--cat, var(--accent)); }
.cycle-filters input[type=checkbox]:checked::after {
  content: ''; position: absolute; left: 3px; top: 1px; width: 4px; height: 8px;
  border: solid #07070b; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.cycle-filters label { font-size: 11px; color: var(--fg-2); cursor: pointer; flex: 1; letter-spacing: 0.04em; }
.cycle-filters input[type=checkbox]:checked + label { color: var(--fg); }

/* Convergence focus panel — glass-morphism v4 */
.conv-panel {
  position: absolute;
  width: min(540px, 92vw);
  background:
    linear-gradient(135deg, rgba(28, 28, 38, 0.62) 0%, rgba(14, 14, 22, 0.78) 100%);
  border: 1px solid rgba(255, 255, 255, 0.09);
  border-radius: 14px;
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  z-index: 24;
  box-shadow:
    0 24px 80px rgba(0,0,0,0.72),
    0 0 1px 0 rgba(255,255,255,0.10) inset,
    0 1px 0 rgba(255,255,255,0.06) inset;
  overflow: hidden;
  animation: convFloat 0.42s cubic-bezier(.2,.7,.2,1.05);
  user-select: none;
}
@keyframes convFloat {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}
.conv-panel.conv-collapsed .conv-panel-body { display: none; }
.conv-panel.conv-collapsed { border-radius: 10px; }
.conv-drag-handle { cursor: grab; flex: 1; }
.conv-drag-handle:active { cursor: grabbing; }
.conv-collapse-btn {
  background: none; border: none; color: var(--fg-3);
  font-size: 12px; cursor: pointer; padding: 2px 6px;
  letter-spacing: 0.14em; font-family: var(--mono);
  transition: color 0.18s;
}
.conv-collapse-btn:hover { color: var(--accent); }
.mc-summary {
  font-size: 10px; line-height: 1.55; color: var(--fg-3);
  letter-spacing: 0.06em; padding: 0 0 10px;
  border-left: 2px solid rgba(240,165,0,0.25);
  padding-left: 10px; margin-bottom: 10px;
  font-style: italic;
}
.conv-speak-btn {
  background: none; border: 1px solid rgba(255,255,255,0.08); color: var(--fg-3);
  font-size: 9px; letter-spacing: 0.14em; cursor: pointer; padding: 3px 8px;
  border-radius: 4px; font-family: var(--mono); transition: all 0.18s;
  margin-left: auto; display: block; margin-top: 4px;
}
.conv-speak-btn:hover { color: var(--accent); border-color: rgba(240,165,0,0.3); }
.conv-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  pointer-events: none;
}
.conv-panel::after {
  content: '';
  position: absolute;
  top: -40%; right: -10%;
  width: 60%; height: 80%;
  background: radial-gradient(closest-side, rgba(240,165,0,0.10), transparent 70%);
  filter: blur(20px);
  pointer-events: none;
}
.conv-panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.conv-panel-tag {
  font-size: 9.5px; letter-spacing: 0.22em; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
}
.conv-panel-dots { display: inline-flex; gap: 3px; }
.conv-panel-dots span { width: 6px; height: 6px; border-radius: 50%; }
.conv-panel-close {
  background: none; border: none; color: var(--fg-3);
  font-size: 22px; cursor: pointer; line-height: 1;
}
.conv-panel-close:hover { color: var(--fg); }
.conv-panel-title {
  font-family: var(--serif); font-style: italic;
  font-size: 26px; font-weight: 500;
  padding: 18px 18px 4px;
  color: var(--fg);
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.conv-panel-zone {
  padding: 0 18px 14px;
  font-size: 10.5px; letter-spacing: 0.18em; color: var(--fg-2);
}
.conv-panel-divider { height: 1px; background: var(--line); margin: 0 18px; }
.conv-panel-section { padding: 14px 18px; }
.conv-panel-eyebrow { font-size: 9px; letter-spacing: 0.22em; color: var(--accent); margin-bottom: 10px; font-weight: 500; }
.conv-panel-events { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.conv-panel-events li {
  display: flex; gap: 12px; align-items: center;
  font-size: 11.5px; color: var(--fg);
  padding: 9px 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border-left: 2px solid var(--accent);
  border-radius: 0 6px 6px 0;
  transition: background 0.18s ease, transform 0.18s ease;
}
.conv-panel-events li:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  transform: translateX(2px);
}
.ev-num { font-family: var(--display); color: var(--accent); font-size: 14px; min-width: 16px; }
.conv-panel-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cpf { padding: 10px 12px; background: rgba(20,20,26,0.4); border-left: 2px solid; }
.cpf-name { font-size: 10.5px; letter-spacing: 0.12em; color: var(--fg); font-weight: 500; }
.cpf-cycle { font-size: 9px; letter-spacing: 0.16em; color: var(--fg-3); margin-top: 3px; }
.conv-trajectory {
  padding: 0 18px 14px;
  font-size: 10px; letter-spacing: 0.14em; color: var(--fg-3);
  display: flex; align-items: center; gap: 8px;
}
.conv-trajectory-arrow { color: var(--accent); font-size: 12px; }
.conv-linked-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.conv-linked-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; cursor: pointer;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border-left: 2px solid;
  border-radius: 0 6px 6px 0;
  transition: background 0.18s ease, transform 0.18s ease;
  gap: 10px;
}
.conv-linked-item:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  transform: translateX(3px);
}
.conv-linked-item-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.conv-linked-item-num { font-family: var(--display); font-size: 13px; min-width: 16px; }
.conv-linked-item-label { font-size: 11px; color: var(--fg); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-linked-item-stat { font-family: var(--display); font-size: 16px; letter-spacing: 0.08em; flex-shrink: 0; }
.conv-linked-item-cta { font-size: 9px; letter-spacing: 0.18em; color: var(--fg-3); flex-shrink: 0; }
.conv-brief-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 36px); margin: 0 18px 18px;
  padding: 11px 16px;
  background: linear-gradient(135deg, rgba(240,165,0,0.12), rgba(240,165,0,0.06));
  border: 1px solid rgba(240,165,0,0.25);
  color: var(--accent); font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; font-weight: 500;
  cursor: pointer; border-radius: 6px;
  transition: all 0.18s ease;
}
.conv-brief-btn:hover { background: linear-gradient(135deg, rgba(240,165,0,0.18), rgba(240,165,0,0.10)); border-color: rgba(240,165,0,0.45); }

/* canvas grab cursor */
.galaxy-stage canvas { cursor: grab; }
.galaxy-stage canvas:active { cursor: grabbing; }

/* Tractor beam panel */
.tractor-panel {
  position: absolute; top: 50%; right: 20px;
  transform: translateY(-50%);
  width: 280px;
  background: var(--glass);
  backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  overflow: hidden;
  z-index: 30;
  box-shadow: 0 0 40px rgba(240,165,0,0.15), 0 8px 32px rgba(0,0,0,0.6);
}
.tractor-panel-beam-indicator {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
  background: rgba(240,165,0,0.06);
}
.tractor-beam-dot {
  width: 7px; height: 7px; border-radius: 50%;
  animation: pulse 1s infinite;
}
.tractor-panel-beam-indicator button { margin-left: auto; }
.tractor-panel-field { padding: 14px 14px 10px; }
.tractor-panel-domain { font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; }
.tractor-panel-name { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; margin: 4px 0 4px; color: var(--fg); }
.tractor-panel-cycle { font-size: 10px; color: var(--fg-3); font-family: var(--mono); }
.tractor-panel-section { padding: 10px 14px; border-top: 1px solid var(--line); }
.tractor-stories { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.tractor-story-item {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 5px 8px; border-radius: 3px;
  transition: background 0.15s;
}
.tractor-story-item:hover { background: rgba(255,255,255,0.05); }
.tractor-story-prob { font-family: var(--mono); font-size: 11px; font-weight: 700; min-width: 32px; }
.tractor-story-name { font-size: 11px; color: var(--fg-2); flex: 1; }
.tractor-story-close { font-family: var(--mono); font-size: 9px; }
.tractor-convs { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.tractor-conv-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 10px;
}
.tractor-conv-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
.tractor-conv-label { color: var(--fg-2); line-height: 1.3; }
.tractor-conv-other { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; margin-top: 2px; }
.tractor-conv-sev { font-family: var(--mono); font-size: 9px; margin-left: auto; flex-shrink: 0; }
.tractor-panel-actions {
  display: flex; gap: 8px; padding: 12px 14px;
  border-top: 1px solid var(--line);
}
.tractor-panel-actions button { flex: 1; justify-content: center; font-size: 10px; }
.ego-hint {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em;
  color: rgba(240,165,0,0.55);
  pointer-events: none; white-space: nowrap;
}

/* Constellation type legend */
.const-legend { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; padding: 0 2px; }
.const-legend-row { display: flex; align-items: center; gap: 8px; }
.const-legend-line {
  display: inline-block; width: 28px; height: 2px; flex-shrink: 0; border-radius: 1px;
}
.const-legend-line.causal { background: #E05C6E; box-shadow: 0 0 4px #E05C6E; }
.const-legend-line.correlated {
  background: transparent;
  border-top: 2px dashed #C09AF5;
}
.const-legend-line.sequential {
  background: transparent;
  border-top: 1px dotted #80d0ff;
}
.const-legend-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; color: var(--fg-3); }

/* Perspective toggle */
.persp-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; margin-bottom: 12px; }
.persp-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--fg-2);
  padding: 10px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.18s ease;
  font-family: var(--mono);
}
.persp-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.16); color: var(--fg-1); }
.persp-btn.active {
  background: linear-gradient(180deg, rgba(240,165,0,0.18) 0%, rgba(240,165,0,0.06) 100%);
  border-color: rgba(240,165,0,0.55);
  color: #FFE9B8;
  box-shadow: 0 0 18px rgba(240,165,0,0.18) inset;
}
.persp-icon { font-size: 18px; line-height: 1; opacity: 0.85; margin-bottom: 2px; }
.persp-btn.active .persp-icon { opacity: 1; text-shadow: 0 0 12px rgba(240,165,0,0.7); }
.persp-label { font-size: 10px; letter-spacing: 0.14em; font-weight: 600; }
.persp-sub { font-size: 9px; color: var(--fg-3); letter-spacing: 0.06em; opacity: 0.7; }

.lp-toggle {
  display: grid; grid-template-columns: auto 1fr; column-gap: 8px; row-gap: 2px;
  align-items: start;
  padding: 8px 6px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  user-select: none;
}
.lp-toggle:hover { background: rgba(255,255,255,0.04); }
.lp-toggle input { grid-row: 1 / 3; align-self: center; accent-color: var(--accent); cursor: pointer; }
.lp-toggle-label { font-size: 10px; font-family: var(--mono); letter-spacing: 0.12em; color: var(--fg-1); font-weight: 600; }
.lp-toggle-sub { font-size: 9px; color: var(--fg-3); letter-spacing: 0.04em; }

/* ───────── Mission Control prompt bar ───────── */
.mission-control {
  position: absolute;
  bottom: 64px; left: 50%;
  transform: translateX(-50%);
  width: min(720px, 86vw);
  z-index: 28;
  display: flex; flex-direction: column; gap: 0;
  background: linear-gradient(135deg, rgba(28,28,38,0.55), rgba(14,14,22,0.78));
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  box-shadow:
    0 24px 80px rgba(0,0,0,0.60),
    0 0 1px rgba(255,255,255,0.10) inset,
    0 1px 0 rgba(255,255,255,0.06) inset;
  overflow: hidden;
  animation: mcRise 0.4s cubic-bezier(.2,.7,.2,1.05);
}
@keyframes mcRise {
  from { opacity: 0; transform: translateX(-50%) translateY(14px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.mc-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
}
.mc-message {
  flex: 1;
  font-size: 12px; color: var(--fg);
  letter-spacing: 0.01em;
  line-height: 1.5;
}
.mc-message-tag {
  display: inline-block;
  font-size: 9px; letter-spacing: 0.22em;
  padding: 2px 7px; border-radius: 3px;
  margin-right: 9px;
  background: rgba(240,165,0,0.14);
  color: var(--accent);
  font-weight: 600;
}
.mc-message-tag.tutorial { background: rgba(74,144,226,0.16); color: #6BA8E8; }
.mc-message-tag.quiz { background: rgba(196,69,105,0.16); color: #E07090; }
.mc-input {
  flex: 1;
  background: rgba(0,0,0,0.32);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--fg); font-family: var(--mono); font-size: 12px;
  outline: none;
  transition: border-color 0.18s, background 0.18s;
}
.mc-input::placeholder { color: var(--fg-3); }
.mc-input:focus {
  border-color: rgba(240,165,0,0.45);
  background: rgba(0,0,0,0.45);
}
.mc-icon-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--fg-2);
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 14px;
  transition: all 0.18s;
}

const _RO = window.ResizeObserver;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// World units: roughly 1 unit ≈ 1 px at zoom=1. Field positions normalized * scale.
function makeCamera() {
  return {
    pos: { x: 0, y: 0, z: 700 },        // camera position in world space
    target: { x: 0, y: 0, z: 0 },        // look-at
    yaw: 0, pitch: -0.05, roll: 0,       // orientation
    zoom: 1,
    // velocities for weightless decay
    vx: 0, vy: 0, vz: 0,
    vyaw: 0, vpitch: 0, vroll: 0,
    vzoom: 0,
    // perpetual drift — gentle forward thrust toward look direction
    driftSpeed: 0.18,                   // world units / frame at 60fps
    driftEnabled: true,
    // mouse-look — cursor offset from center adds yaw/pitch bias (zero-G)
    mouseYaw: 0, mousePitch: 0,
    // arrow keys — accumulated thrust intent (zero-G)
    keyThrust: { yaw: 0, pitch: 0, roll: 0, fwd: 0, lat: 0, vert: 0 },
    // warp / hyperdrive
    warpT: 0, warpFromZ: 0, warpDuration: 0,
    // anim targets (when fly-to)
    flying: false,
    // pause: freeze all camera physics
    paused: false,
    // egocentric auto-track: time of last manual drag input
    lastManualInputT: 0,
  };
}

// Project a world point through the camera. Returns {x, y, depth, scale} in screen px.
function project(p, cam, w, h) {
  // Translate by camera pos (camera-relative)
  let dx = p.x - cam.pos.x;
  let dy = p.y - cam.pos.y;
  let dz = p.z - cam.pos.z;
  // Yaw (around Y axis): rotates X/Z plane
  const cy = Math.cos(-cam.yaw), sy = Math.sin(-cam.yaw);
  let x1 = dx * cy + dz * sy;
  let z1 = -dx * sy + dz * cy;
  // Pitch (around X axis): rotates Y/Z plane
  const cp = Math.cos(-cam.pitch), sp = Math.sin(-cam.pitch);
  let y2 = dy * cp - z1 * sp;
  let z2 = dy * sp + z1 * cp;
  // Roll (around Z axis): rotates X/Y
  const cr = Math.cos(-cam.roll), sr = Math.sin(-cam.roll);
  let x3 = x1 * cr - y2 * sr;
  let y3 = x1 * sr + y2 * cr;
  // Perspective
  const fov = 700;        // focal length
  // z is positive forward in our convention; we want positive going INTO screen
  const depth = -z2;       // forward depth from camera
  if (depth <= 0.1) return { visible: false };
  const scale = (fov * cam.zoom) / depth;
  return {
    visible: true,
    x: w / 2 + x3 * scale,
    y: h / 2 + y3 * scale,
    scale,
    depth,
  };
}

// Reverse: ray pick (approximate) — given screen point, find nearest object in list (already projected).
function pickNearest(items, mx, my, threshold) {
  let best = null, bestD = threshold;
  for (const it of items) {
    if (!it.proj || !it.proj.visible) continue;
    const d = Math.hypot(it.proj.x - mx, it.proj.y - my);
    if (d < bestD) { bestD = d; best = it; }
  }
  return best;
}

// ───── Otherworldly background generator (procedural) ─────
function drawCelestialBg(ctx, t, color, w, h) {
  // Used in story focus mode — large rotating planet behind everything.
  ctx.save();
  const cx = w * 0.65, cy = h * 0.5;
  const R = Math.min(w, h) * 0.55;

  // Halo
  const halo = ctx.createRadialGradient(cx, cy, R * 0.85, cx, cy, R * 1.6);
  halo.addColorStop(0, hexA(color, 0.18));
  halo.addColorStop(1, hexA(color, 0));
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, w, h);

  // Disk
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  const disk = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
  disk.addColorStop(0, hexA(color, 0.55));
  disk.addColorStop(0.6, hexA(color, 0.18));
  disk.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = disk;
  ctx.fill();

  // Surface bands (rotating)
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();
  const rot = t * 0.04;
  for (let i = -8; i <= 8; i++) {
    const yb = cy + i * (R / 6) + Math.sin(t * 0.3 + i) * 4;
    const off = Math.sin(rot + i * 0.4) * R * 0.3;
    ctx.beginPath();
    ctx.ellipse(cx + off, yb, R * 1.4, R * 0.04 + Math.abs(Math.sin(i)) * 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = hexA(color, 0.07 + 0.05 * Math.abs(Math.sin(i + t * 0.2)));
    ctx.fill();
  }
  // Storm spots
  for (let i = 0; i < 4; i++) {
    const sa = rot * 1.5 + i * 1.7;
    const sx = cx + Math.cos(sa) * R * 0.55;
    const sy = cy + Math.sin(sa * 0.7) * R * 0.35;
    const sr = R * 0.08 + Math.sin(t + i) * 4;
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    sg.addColorStop(0, hexA('#ffffff', 0.35));
    sg.addColorStop(0.4, hexA(color, 0.3));
    sg.addColorStop(1, hexA(color, 0));
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // Rings (some celestials)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(0.4 + Math.sin(t * 0.05) * 0.05);
  ctx.scale(1, 0.18);
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, R * (1.15 + i * 0.08), 0, Math.PI * 2);
    ctx.strokeStyle = hexA(color, 0.18 - i * 0.05);
    ctx.lineWidth = 6 - i * 1.5;
    ctx.stroke();
  }
  ctx.restore();

  // Atmosphere terminator
  const term = ctx.createRadialGradient(cx + R * 0.4, cy + R * 0.3, R * 0.5, cx, cy, R);
  term.addColorStop(0, 'rgba(0,0,0,0)');
  term.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = term;
  ctx.fill();

  ctx.restore();
}

// ───── Black hole ─────
function drawBlackHole(ctx, x, y, r, t, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Accretion disk
  ctx.translate(x, y);
  ctx.rotate(t * 0.4);
  const disk = ctx.createRadialGradient(0, 0, r * 0.7, 0, 0, r * 2.6);
  disk.addColorStop(0, 'rgba(0,0,0,1)');
  disk.addColorStop(0.5, hexA('#F0A500', 0.6));
  disk.addColorStop(0.8, hexA('#C44569', 0.25));
  disk.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.scale(1, 0.35);
  ctx.beginPath();
  ctx.arc(0, 0, r * 2.6, 0, Math.PI * 2);
  ctx.fillStyle = disk;
  ctx.fill();
  ctx.restore();
  // Event horizon
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.strokeStyle = hexA('#F0A500', 0.4);
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
}

// ───── Supernova ─────
function drawSupernova(ctx, x, y, color, age) {
  // age 0..1
  const r = 8 + age * 240;
  const a = 1 - age;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, hexA('#ffffff', a));
  g.addColorStop(0.2, hexA(color, a * 0.7));
  g.addColorStop(1, hexA(color, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Spike rays
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = hexA('#ffffff', a * 0.8);
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.moveTo(-r * 0.9, 0); ctx.lineTo(r * 0.9, 0);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCalendarArc(ctx, w, h, domain, t, allFields, filterCats, calAlpha, hexA, clamp, CATEGORY) {
  if (calAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = calAlpha;

  const cat = CATEGORY[domain] || { color: '#F0A500', label: domain.toUpperCase() };
  const arcLeft = w * 0.07;
  const arcRight = w * 0.93;
  const arcWidth = arcRight - arcLeft;
  const arcMidY = h * 0.5;
  const arcPeak = h * 0.14;

  // Arc position helpers (parabola, peaking in the middle at month 6.5)
  const arcX = (m) => arcLeft + ((m - 1) / 11) * arcWidth;
  const arcY = (m) => arcMidY - arcPeak * 4 * ((m - 1) / 11) * (1 - (m - 1) / 11);

  // Full arc path
  ctx.beginPath();
  for (let m = 1; m <= 12; m++) {
    const x = arcX(m), y = arcY(m);
    if (m === 1) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = hexA(cat.color, 0.22);
  ctx.lineWidth = 1.2;
  ctx.setLineDash([4, 7]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Month tick marks + labels
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  ctx.textAlign = 'center';
  ctx.font = "7.5px 'JetBrains Mono', monospace";
  for (let m = 1; m <= 12; m++) {
    const x = arcX(m), y = arcY(m);
    // Tick
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fillStyle = hexA(cat.color, 0.35);
    ctx.fill();
    // Month label
    ctx.fillStyle = hexA('#f5f5f0', 0.3);
    ctx.fillText(MONTHS[m - 1], x, y + 16);
  }

  // Anchor events
  const anchors = CALENDAR_ANCHORS[domain] || [];
  for (const a of anchors) {
    const x = arcX(a.month), y = arcY(a.month);
    // Bright anchor dot
    const gr = ctx.createRadialGradient(x, y, 0, x, y, 10);
    gr.addColorStop(0, hexA(cat.color, 0.7));
    gr.addColorStop(1, hexA(cat.color, 0));
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = hexA(cat.color, 0.9);
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Anchor label — alternates above/below to prevent overlap
    const anchorIdx = anchors.indexOf(a);
    const labelAbove = anchorIdx % 2 === 0;
    ctx.fillStyle = hexA(cat.color, 0.75);
    ctx.font = "7px 'JetBrains Mono', monospace";
    ctx.fillText(a.label, x, labelAbove ? y - 12 : y + 22);
  }

  // Domain title top-left
  ctx.textAlign = 'left';
  ctx.font = "800 11px 'JetBrains Mono', monospace";
  ctx.fillStyle = hexA(cat.color, 0.7);
  ctx.fillText('CALENDAR ARC · ' + (cat.label || domain.toUpperCase()), arcLeft, arcY(1) - 28);
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.fillStyle = hexA('#f5f5f0', 0.35);
  ctx.fillText('JAN → DEC 2026 · RESOLUTION CYCLE', arcLeft, arcY(1) - 14);

  // Stories on arc
  const G = window.GALAXY;
  const storyCount = { placed: 0 };
  for (const f of allFields) {
    if (f.domain !== domain) continue;
    for (const s of f.stories) {
      const m = s.resolutionMonth || 6;
      const x = arcX(m);
      const y = arcY(m);
      const r = clamp(3 + (s.magnitude / 30) * 5, 3, 9);
      const pulse = 1 + 0.12 * Math.sin(t * 2 + s.magnitude * 0.3);

      // Glow
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3.5);
      g.addColorStop(0, hexA(cat.color, 0.9));
      g.addColorStop(1, hexA(cat.color, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r * 3.5 * pulse, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, r * pulse, 0, Math.PI * 2);
      ctx.fill();

      // Story label
      ctx.fillStyle = hexA('#f5f5f0', 0.75);
      ctx.font = "8.5px 'JetBrains Mono', monospace";
      ctx.textAlign = 'left';
      const lx = x + r + 5;
      const ly = y - r - 3;
      ctx.fillText(s.name.length > 28 ? s.name.slice(0, 26) + '…' : s.name, lx, ly);
      // Prob
      ctx.fillStyle = hexA(cat.color, 0.65);
      ctx.font = "7.5px 'JetBrains Mono', monospace";
      ctx.fillText(s.prob + '%', lx, ly + 11);
      storyCount.placed++;
    }
  }

  // Story count badge
  ctx.textAlign = 'right';
  ctx.font = "9px 'JetBrains Mono', monospace";
  ctx.fillStyle = hexA(cat.color, 0.55);
  ctx.fillText(`${storyCount.placed} MARKETS · ${domain.toUpperCase()} ARC`, arcRight, arcY(1) - 14);

  ctx.textAlign = 'left';
  ctx.restore();
}

// ───── Main component ─────
function GalaxyCanvas(props) {

    onStoryClick, onFieldClick, onConvergenceClick,
